<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sphere and Conical Frustum</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="ui-panel">
      <h1>Shape Controls</h1>
      <p class="ui-subtitle">Adjust look, geometry, playback, and frame layout.</p>

      <section class="ui-group">
        <h2 class="group-title">Appearance</h2>
        <label class="field">
          <span>Shape color</span>
          <input id="shape-color" type="color" value="#1c1c1c" />
        </label>

        <label class="field">
          <span>Render mode</span>
          <select id="shading-mode">
            <option value="lit" selected>Lit</option>
            <option value="flat">Flat color</option>
            <option value="depth">Depth map</option>
          </select>
        </label>

        <div id="depth-controls" class="mode5-controls" hidden>
          <label class="toggle">
            <input id="depth-blur-toggle" type="checkbox" />
            <span>模糊</span>
          </label>
          <label class="toggle">
            <input id="depth-dynamic-toggle" type="checkbox" />
            <span>动态</span>
          </label>
        </div>
      </section>

      <section class="ui-group">
        <h2 class="group-title">Geometry</h2>
        <label class="field">
          <span>Frustum length</span>
          <input id="frustum-length-range" type="range" min="489.493138" max="10000" step="0.1" value="489.493138" />
          <input id="frustum-length-number" type="number" min="489.493138" max="10000" step="0.1" value="489.493138" />
        </label>

        <label class="field">
          <span>Large base diameter</span>
          <input id="frustum-diameter-range" type="range" min="160.829039" max="3285.6240" step="0.1" value="160.829039" />
          <input id="frustum-diameter-number" type="number" min="160.829039" max="3285.6240" step="0.1" value="160.829039" />
        </label>

        <label class="field">
          <span>Gap (x sphere diameter)</span>
          <input id="gap-range" type="range" min="0" max="8" step="0.1" value="0.5" />
          <input id="gap-number" type="number" min="0" max="8" step="0.1" value="0.5" />
        </label>

        <label class="toggle">
          <input id="proportion-lock" type="checkbox" checked />
          <span>Scale proportionally</span>
        </label>
      </section>

      <section class="ui-group">
        <h2 class="group-title">Playback</h2>
        <label class="field">
          <span>Zoom</span>
          <input id="zoom-range" type="range" min="5" max="220" step="0.1" value="12.2" />
          <input id="zoom-number" type="number" min="5" max="220" step="0.1" value="12.2" />
        </label>

        <label class="field">
          <span>Perspective</span>
          <input id="perspective-range" type="range" min="12" max="200" step="0.1" value="38" />
          <input id="perspective-number" type="number" min="12" max="200" step="0.1" value="38" />
        </label>

        <label class="field">
          <span>Play mode</span>
          <select id="play-mode">
            <option value="off" selected>Off</option>
            <option value="play1">1 Organic orbit</option>
            <option value="play2">2 Horizontal orbit</option>
            <option value="play4">3 Long fixed orbit</option>
            <option value="play6">4 Hold-spin loop</option>
            <option value="play7">5 Shape / OLAB switch</option>
            <option value="play5">6 Top shape / text orbit</option>
          </select>
        </label>

        <div id="mode1-controls" class="mode1-controls" hidden>
          <label class="toggle">
            <input id="play1-environment-toggle" type="checkbox" />
            <span>360 environment</span>
          </label>
          <label class="field">
            <span>Upload 360 photo</span>
            <input id="play1-environment-input" type="file" accept="image/*,.exr" />
          </label>
          <button id="clear-play1-environment-btn" type="button">Clear Environment Photo</button>
        </div>

        <div id="mode4-controls" class="mode4-controls" hidden>
          <label class="field">
            <span>4 expanded length</span>
            <input
              id="mode4-expanded-length-input"
              type="number"
              min="489.493138"
              max="10000"
              step="1"
              value="3500"
            />
          </label>

          <label class="field">
            <span>4 easing</span>
            <input id="mode4-ease-range" type="range" min="0" max="1" step="0.01" value="1" />
            <input id="mode4-ease-number" type="number" min="0" max="1" step="0.01" value="1" />
          </label>

          <label class="field">
            <span>4 zoom amount</span>
            <input id="mode4-zoom-amount-range" type="range" min="0" max="120" step="0.1" value="120" />
            <input id="mode4-zoom-amount-number" type="number" min="0" max="120" step="0.1" value="120" />
          </label>

          <label class="field">
            <span>4 image mode</span>
            <select id="mode4-image-mode">
              <option value="mask" selected>Mask (screen-locked)</option>
              <option value="follow">Follow base rotation</option>
            </select>
          </label>

          <label class="field">
            <span>4 mask images</span>
            <input id="mode4-images-input" type="file" accept="image/*" multiple />
          </label>
          <button id="clear-mode4-images-btn" type="button">Clear Play4 Images</button>
          <input id="mode4-replace-input" type="file" accept="image/*" hidden />
          <div id="mode4-images-list" class="mode4-images-list"></div>
          <p id="mode4-images-status" class="copy-status"></p>
        </div>

        <div id="mode5-controls" class="mode5-controls" hidden>
          <label class="field">
            <span>5 center mode</span>
            <select id="mode5-center-mode">
              <option value="anchor" selected>Sphere / O center</option>
              <option value="full">Whole figure center (realtime)</option>
            </select>
          </label>
          <label class="toggle">
            <input id="mode5-stack-toggle" type="checkbox" />
            <span>5 stacked swap</span>
          </label>
        </div>

        <div id="mode6-controls" class="mode6-controls" hidden>
          <label class="field">
            <span>6 text segments</span>
            <div id="mode6-segments-list" class="mode6-segments-list"></div>
          </label>
          <button id="mode6-add-segment-btn" type="button">Add text segment</button>
          <label class="toggle">
            <input id="mode6-fill-text-toggle" type="checkbox" />
            <span>6 fill text size</span>
          </label>
        </div>
      </section>

      <section class="ui-group">
        <h2 class="group-title">Frame</h2>
        <label class="field">
          <span>Frame background</span>
          <input id="frame-bg-color" type="color" value="#ffffff" />
        </label>

        <div class="frame-size">
          <label class="field compact">
            <span>Frame width</span>
            <input id="frame-width-input" type="number" min="260" max="2200" step="1" value="600" />
          </label>
          <label class="field compact">
            <span>Frame height</span>
            <input id="frame-height-input" type="number" min="300" max="2200" step="1" value="800" />
          </label>
        </div>

        <label class="field">
          <span>Background image</span>
          <input id="frame-image-input" type="file" accept="image/*" />
        </label>
        <button id="clear-image-btn" type="button">Clear Background Image</button>
      </section>

      <section class="ui-group">
        <h2 class="group-title">Rotation</h2>
        <div class="angles">
          <label><span>X</span><input id="rot-x-input" type="number" step="0.1" value="0" /></label>
          <label><span>Y</span><input id="rot-y-input" type="number" step="0.1" value="0" /></label>
          <label><span>Z</span><input id="rot-z-input" type="number" step="0.1" value="0" /></label>
        </div>
      </section>

      <section class="ui-group ui-actions">
        <button id="reset-btn" type="button">Reset</button>
        <button id="copy-svg-btn" type="button">Copy Current Frame As SVG</button>
      </section>
      <p id="copy-status" class="copy-status"></p>
    </aside>

    <main id="frame-shell">
      <div id="frame" style="width: 600px; height: 800px">
        <div id="play1-environment" aria-hidden="true"></div>
        <img id="frame-bg-image" alt="" />
        <div id="mode6-text-orbit" class="mode6-text-orbit" aria-hidden="true">
          <div id="mode6-text-carrier" class="mode6-text-carrier">
            <div id="mode6-middle-text" class="mode6-middle-text">INSERT TEXT</div>
          </div>
        </div>
        <div id="mode5-olab-wrap" class="mode5-olab-wrap" aria-hidden="true">
          <svg id="mode5-olab-svg" class="mode5-olab-svg" viewBox="0 0 155 47" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g id="mode5-olab-lab" class="mode5-olab-lab">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M67.8354 36.6297H77.8176V46.1561H67.4966C65.9109 46.1561 64.391 45.5224 63.2748 44.3959L60.071 41.1625C58.9683 40.0495 58.3496 38.5461 58.3496 36.9794L58.3496 0H67.8354V36.6297Z" fill="currentColor"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M99.0328 8.7989C106.7 8.79955 112.915 15.0164 112.915 22.6835V36.6675H117.485V46.1289H105.853V36.9833H103.513L100.893 41.4563C99.0394 44.6208 95.647 46.5654 91.9796 46.5654L91.3666 46.5491H91.3544C85.0505 46.2304 80.2625 41.7082 79.9362 35.3866V35.3745L79.9199 34.7614V34.7513C79.92 28.1611 85.4693 22.6663 92.2882 22.6815L97.9005 22.6926L103.513 22.7038V22.1862C103.512 19.7118 101.507 17.7069 99.0328 17.7061L83.9594 17.7041L83.9635 8.79688L99.0328 8.7989ZM92.2679 30.7219C90.3013 30.7177 88.7138 32.2959 88.7135 34.2296C88.7135 36.0873 90.2015 37.7718 92.3592 37.7718C96.7149 37.7714 103.178 31.3239 103.178 31.3239V30.7219H92.2679Z" fill="currentColor"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M129.517 16.9707H131.866L134.06 13.2678C135.791 10.3461 138.94 8.55895 142.336 8.57027C150.042 8.5759 154.988 15.9028 154.988 25.1932V29.8234C154.988 38.9702 150.301 46.5641 142.336 46.5641C138.939 46.5641 135.795 44.7687 134.069 41.8431L131.866 38.1097H129.517V46.1621H119.977V0H129.517V16.9707ZM138.246 17.7921C133.951 17.7926 130.934 22.2185 130.934 25.1932V29.8234C130.934 33.4949 134.609 37.334 138.246 37.3341C142.716 37.3333 145.559 33.3132 145.559 29.8234V25.1932C145.558 22.2654 143.177 17.7921 138.246 17.7921Z" fill="currentColor"/>
            </g>
            <path fill-rule="evenodd" clip-rule="evenodd" d="M18.9553 8.63281C29.423 8.63336 37.9085 17.1203 37.9085 27.5881C37.9083 38.0557 29.4228 46.5408 18.9553 46.5414C8.48735 46.5414 0.00026142 38.0561 0 27.5881C0 17.12 8.48715 8.63281 18.9553 8.63281ZM18.9492 18.4434C13.8993 18.4437 9.8065 22.538 9.80649 27.5881C9.80649 32.6382 13.8993 36.7325 18.9492 36.7328C23.9995 36.7328 28.0939 32.6384 28.0939 27.5881C28.0939 22.5378 23.9995 18.4434 18.9492 18.4434Z" fill="currentColor"/>
          </svg>
        </div>
        <canvas id="scene"></canvas>
      </div>
      <div id="resize-handle" aria-label="Resize frame" title="Drag to resize"></div>
    </main>

    <script>
      (function () {
        function showError(message) {
          var box = document.getElementById("runtime-error-box");
          if (!box) {
            box = document.createElement("div");
            box.id = "runtime-error-box";
            box.style.position = "fixed";
            box.style.right = "14px";
            box.style.bottom = "14px";
            box.style.maxWidth = "min(560px, calc(100vw - 28px))";
            box.style.padding = "10px 12px";
            box.style.borderRadius = "12px";
            box.style.fontFamily = "ui-monospace, SFMono-Regular, Menlo, monospace";
            box.style.fontSize = "12px";
            box.style.lineHeight = "1.4";
            box.style.color = "#fff";
            box.style.background = "rgba(140, 10, 10, 0.9)";
            box.style.boxShadow = "0 10px 30px rgba(0,0,0,0.25)";
            box.style.zIndex = "9999";
            document.body.appendChild(box);
          }
          box.textContent = message;
        }

        window.addEventListener("error", function (event) {
          if (!event) return;
          var msg = event.message || "Unknown runtime error";
          var file = event.filename ? " @ " + event.filename : "";
          var line = event.lineno ? ":" + event.lineno : "";
          showError("JS Error: " + msg + file + line);
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event && event.reason ? String(event.reason) : "Unknown promise rejection";
          showError("Promise Error: " + reason);
        });
      })();
    </script>
    <script src="./main.js"></script>
  </body>
</html>
