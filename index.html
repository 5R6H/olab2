<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O.lab Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="ui-panel">
      <nav class="ui-tabs" aria-label="Control sections">
        <button class="ui-tab is-active" type="button" data-tab-target="foundation" aria-selected="true">Basics</button>
        <button class="ui-tab" type="button" data-tab-target="layout" aria-selected="false">Layout</button>
        <button class="ui-tab" type="button" data-tab-target="motion" aria-selected="false">Motion</button>
        <button class="ui-tab" type="button" data-tab-target="output" aria-selected="false">Output</button>
        <button class="ui-tab" type="button" data-tab-target="developer" aria-selected="false">Dev</button>
      </nav>

      <section class="ui-section tab-panel is-active" data-tab-panel="foundation">
        <div class="section-head">
          <p class="section-index">01</p>
          <div class="section-copy">
            <h2>Basics</h2>
          </div>
        </div>

        <section class="ui-group">
          <h2 class="group-title">Frame</h2>
          <label class="field">
            <span>Frame preset</span>
            <select id="frame-preset-select">
              <option value="custom" selected>Custom</option>
              <option value="a4-portrait">A4 Portrait</option>
              <option value="a4-landscape">A4 Landscape</option>
              <option value="a5-portrait">A5 Portrait</option>
              <option value="letter-portrait">US Letter Portrait</option>
              <option value="letter-landscape">US Letter Landscape</option>
              <option value="instagram-post">Instagram Post</option>
              <option value="instagram-portrait">Instagram Portrait</option>
              <option value="instagram-story">Instagram Story / Reel</option>
              <option value="youtube-thumb">YouTube Thumbnail</option>
              <option value="presentation-16x9">Presentation 16:9</option>
            </select>
          </label>
          <p id="frame-preset-note" class="copy-status"></p>

          <label class="field">
            <span>Frame background</span>
            <input id="frame-bg-color" type="color" value="#ffffff" />
          </label>
          <div
            class="brand-color-presets"
            data-color-presets-for="frame-bg-color"
            aria-label="Frame background brand color presets"
          ></div>

          <div class="frame-size">
            <label class="field compact">
              <span>Frame width</span>
              <input id="frame-width-input" type="number" min="100" max="2200" step="1" value="600" />
            </label>
            <label class="field compact">
              <span>Frame height</span>
              <input id="frame-height-input" type="number" min="100" max="2200" step="1" value="800" />
            </label>
          </div>

          <label class="field">
            <span>Background image</span>
            <input id="frame-image-input" type="file" accept="image/*" />
          </label>
          <div class="field-grid field-grid-compact">
            <label class="field compact">
              <span>Image fit</span>
              <select id="frame-image-fit-select">
                <option value="contain" selected>Contain / fit</option>
                <option value="fill">Fill</option>
              </select>
            </label>
            <label class="field compact">
              <span>Image area</span>
              <select id="frame-image-scope-select">
                <option value="frame" selected>Whole frame</option>
                <option value="grid">Grid area</option>
              </select>
            </label>
            <label class="field compact">
              <span>Image layer</span>
              <select id="frame-image-layer-select">
                <option value="back" selected>Behind mark & text</option>
                <option value="front">In front of mark & text</option>
              </select>
            </label>
          </div>
          <button id="clear-image-btn" type="button" hidden>Clear Image</button>
        </section>

        <section class="ui-group">
          <h2 class="group-title">Appearance</h2>
          <label class="field">
            <span>Ink color</span>
            <input id="shape-color" type="color" value="#1c1c1c" />
          </label>
          <div
            class="brand-color-presets"
            data-color-presets-for="shape-color"
            aria-label="Ink color brand color presets"
          ></div>
        </section>

        <section class="ui-group">
          <h2 class="group-title">Camera</h2>
          <label class="field">
            <span>Zoom</span>
            <input id="zoom-range" type="range" min="5" max="5000" step="0.1" value="12.2" />
            <input id="zoom-number" type="number" min="5" max="5000" step="0.1" value="12.2" />
          </label>

          <label class="field">
            <span>Perspective</span>
            <input id="perspective-range" type="range" min="0" max="200" step="0.1" value="0" />
            <input id="perspective-number" type="number" min="0" max="200" step="0.1" value="0" />
          </label>
        </section>

        <section class="ui-group ui-actions">
          <button id="reset-btn" type="button">Reset All</button>
        </section>
      </section>

      <section class="ui-section tab-panel" data-tab-panel="layout" hidden>
        <div class="section-head">
          <p class="section-index">02</p>
          <div class="section-copy">
            <h2>Layout</h2>
          </div>
        </div>

        <section class="ui-group">
          <h2 class="group-title">Layout Grid</h2>
          <label class="field">
            <span>Layout</span>
            <select id="type-layout-select">
              <option value="free">Free</option>
              <option value="layout1" selected>Layout 1</option>
            </select>
          </label>

          <div class="field type-mark-mode-field">
            <span>Mark type</span>
            <select id="type-mark-mode-select" class="control-hidden" aria-hidden="true" tabindex="-1">
              <option value="icon" selected>Icon only</option>
              <option value="combination">Combination mark</option>
              <option value="separate">Separate mark</option>
              <option value="wordmark">Wordmark only</option>
            </select>
            <div class="type-mark-mode-grid" role="group" aria-label="Mark type">
              <button class="type-mark-mode-card" type="button" data-type-mark-mode="icon" aria-label="Icon only" aria-pressed="true">
                <span class="mark-preview mark-preview-icon" aria-hidden="true">
                  <svg class="mark-preview-svg mark-preview-shape-svg" viewBox="0 0 459 114" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M458.867 8.59961L169.969 29.3402V84.013L458.867 104.754V8.59961Z" fill="currentColor"/>
                    <ellipse cx="56.6559" cy="56.6588" rx="56.6559" ry="56.6588" fill="currentColor"/>
                  </svg>
                </span>
              </button>
              <button class="type-mark-mode-card" type="button" data-type-mark-mode="combination" aria-label="Combination mark" aria-pressed="false">

          </div>

          <div class="field type-placement-field" id="type-placement-field">
            <span>Placement</span>
            <div id="type-placement-grid" class="type-placement-grid" role="group" aria-label="Logo placement">
              <button type="button" data-type-logo-placement="top-left" aria-label="Top left" title="Top left">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="top-center" aria-label="Top center" title="Top center">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="top-right" aria-label="Top right" title="Top right">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="middle-left" aria-label="Middle left" title="Middle left">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="center" aria-label="Center" title="Center">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="middle-right" aria-label="Middle right" title="Middle right">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="bottom-left" aria-label="Bottom left" title="Bottom left">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="bottom-center" aria-label="Bottom center" title="Bottom center">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
              <button type="button" data-type-logo-placement="bottom-right" aria-label="Bottom right" title="Bottom right">
                <span class="placement-dot" aria-hidden="true"></span>
              </button>
            </div>
          </div>

          <label class="toggle">
            <input id="type-grid-toggle" type="checkbox" checked />
            <span>Show frame grid</span>
          </label>

          <div class="field-grid field-grid-compact">
            <label class="field compact">
              <span>End column</span>
              <select id="type-layout1-end-col-input">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="6">6</option>
              </select>
            </label>
            <label class="field compact">
              <span>Columns</span>
              <input id="type-grid-columns-input" type="number" min="2" max="12" step="1" value="6" />
            </label>
            <label class="field compact">
              <span>Margin</span>
              <input id="type-grid-margin-input" type="number" min="0" max="240" step="1" value="48" />
            </label>
            <label class="field compact">
              <span>Gutter</span>
              <input id="type-grid-gutter-input" type="number" min="0" max="120" step="1" value="16" />
            </label>
            <label class="field compact">
              <span>Rows</span>
              <input id="type-grid-baseline-input" type="number" min="6" max="6" step="1" value="6" disabled />
            </label>
          </div>

          <button id="type-add-text-btn" type="button">Add Text</button>
          <button id="type-clear-texts-btn" type="button">Clear All Text</button>

          <label class="field">
            <span>Current text align</span>
            <select id="type-text-align-select">
              <option value="left" selected>Left</option>
              <option value="center">Center</option>
            </select>
          </label>
        </section>
      </section>

      <section class="ui-section tab-panel" data-tab-panel="motion" hidden>
        <div class="section-head">
          <p class="section-index">03</p>
          <div class="section-copy">
            <h2>Motion</h2>
          </div>
        </div>

        <section class="ui-group">
          <h2 class="group-title">Playback</h2>
          <label class="field">
            <span>Play mode</span>
            <select id="play-mode">
              <option value="off" selected>Off</option>
              <option value="play1">1 Organic orbit</option>
              <option value="play2">2 Horizontal orbit</option>
              <option value="play4">3 Shape orbit</option>
              <option value="play6">4 Hold-spin loop</option>
              <option value="play7">5 Shape / OLAB switch</option>
              <option value="play5">6 Top shape / text orbit</option>
            </select>
          </label>

          <div id="mode1-controls" class="mode1-controls" hidden>
            <label class="toggle">
              <input id="play1-environment-toggle" type="checkbox" />
              <span>360 environment</span>
            </label>
            <label class="field">
              <span>Upload 360 photo</span>
              <input id="play1-environment-input" type="file" accept="image/*,.exr" />
            </label>
            <button id="clear-play1-environment-btn" type="button">Clear Environment</button>
          </div>

          <div id="mode4-controls" class="mode4-controls" hidden>
            <label class="field">
              <span>4 expanded length</span>
              <input
                id="mode4-expanded-length-input"
                type="number"
                min="489.493138"
                max="10000"
                step="1"
                value="3500"
              />
            </label>

            <label class="field">
              <span>4 easing</span>
              <input id="mode4-ease-range" type="range" min="0" max="1" step="0.01" value="1" />
              <input id="mode4-ease-number" type="number" min="0" max="1" step="0.01" value="1" />
            </label>

            <label class="field">
              <span>4 zoom amount</span>
              <input id="mode4-zoom-amount-range" type="range" min="0" max="120" step="0.1" value="120" />
              <input id="mode4-zoom-amount-number" type="number" min="0" max="120" step="0.1" value="120" />
            </label>

            <label class="field">
              <span>4 image mode</span>
              <select id="mode4-image-mode">
                <option value="mask" selected>Mask (screen-locked)</option>
                <option value="follow">Follow base rotation</option>
              </select>
            </label>

            <label class="field">
              <span>4 mask images</span>
              <input id="mode4-images-input" type="file" accept="image/*" multiple />
            </label>
            <button id="clear-mode4-images-btn" type="button">Clear Masks</button>
            <input id="mode4-replace-input" type="file" accept="image/*" hidden />
            <div id="mode4-images-list" class="mode4-images-list"></div>
            <p id="mode4-images-status" class="copy-status"></p>
          </div>

          <div id="mode5-controls" class="mode5-controls" hidden>
            <label class="field">
              <span>Center mode</span>
              <select id="mode5-center-mode">
                <option value="anchor">Sphere / O center</option>
                <option value="full" selected>Whole figure center (realtime)</option>
              </select>
            </label>
            <label class="field mode5-shape-only-control">
              <span>Spin seconds</span>
              <input id="mode5-shape-spin-seconds-input" type="number" min="0.3" max="20" step="0.1" value="1.7" />
            </label>
            <label class="field mode5-shape-only-control">
              <span>Hold seconds</span>
              <input id="mode5-shape-hold-seconds-input" type="number" min="0" max="20" step="0.1" value="0" />
            </label>
            <div class="mode5-switch-layout-control">
              <input id="mode5-stack-toggle" type="checkbox" hidden />
              <div class="mode5-switch-layout-grid" role="group" aria-label="Switch layout">
                <button class="mode5-switch-layout-option" type="button" data-mode5-stack-choice="single" aria-pressed="true">
                  <span class="mode5-switch-preview mode5-switch-preview-single" aria-hidden="true">

    <script>
      (function () {
        function showError(message) {
          var box = document.getElementById("runtime-error-box");
          if (!box) {
            box = document.createElement("div");
            box.id = "runtime-error-box";
            box.style.position = "fixed";
            box.style.right = "14px";
            box.style.bottom = "14px";
            box.style.maxWidth = "min(560px, calc(100vw - 28px))";
            box.style.padding = "10px 12px";
            box.style.borderRadius = "12px";
            box.style.fontFamily = "ui-monospace, SFMono-Regular, Menlo, monospace";
            box.style.fontSize = "12px";
            box.style.lineHeight = "1.4";
            box.style.color = "#fff";
            box.style.background = "rgba(140, 10, 10, 0.9)";
            box.style.boxShadow = "0 10px 30px rgba(0,0,0,0.25)";
            box.style.zIndex = "9999";
            document.body.appendChild(box);
          }
          box.textContent = message;
        }

        window.addEventListener("error", function (event) {
          if (!event) return;
          var msg = event.message || "Unknown runtime error";
          var file = event.filename ? " @ " + event.filename : "";
          var line = event.lineno ? ":" + event.lineno : "";
          showError("JS Error: " + msg + file + line);
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event && event.reason ? String(event.reason) : "Unknown promise rejection";
          showError("Promise Error: " + reason);
        });
      })();
    </script>
