      const points = {
        ltf: { x: x - hw, y: y - hh, z: z + hd },
        rtf: { x: x + hw, y: y - hh, z: z + hd },
        rbf: { x: x + hw, y: y + hh, z: z + hd },
        lbf: { x: x - hw, y: y + hh, z: z + hd },
        ltb: { x: x - hw, y: y - hh, z: z - hd },
        rtb: { x: x + hw, y: y - hh, z: z - hd },
        rbb: { x: x + hw, y: y + hh, z: z - hd },
        lbb: { x: x - hw, y: y + hh, z: z - hd }
      };

      return [
        { normal: { x: 0, y: 0, z: 1 }, corners: [points.ltf, points.rtf, points.rbf, points.lbf] },
        { normal: { x: 0, y: 0, z: -1 }, corners: [points.rtb, points.ltb, points.lbb, points.rbb] },
        { normal: { x: 1, y: 0, z: 0 }, corners: [points.rtf, points.rtb, points.rbb, points.rbf] },
        { normal: { x: -1, y: 0, z: 0 }, corners: [points.ltb, points.ltf, points.lbf, points.lbb] },
        { normal: { x: 0, y: -1, z: 0 }, corners: [points.ltb, points.rtb, points.rtf, points.ltf] },
        { normal: { x: 0, y: 1, z: 0 }, corners: [points.lbf, points.rbf, points.rbb, points.lbb] }
      ];
    }

    function buildExportBox(width, height, depth, x, y, z, color, transformState, mode) {
      const faces = getBoxFaceDefinitions(width, height, depth, x, y, z)
        .map((face) => {
          const rotatedNormal = rotateVectorByTransform(face.normal, transformState);
          const projectedCorners = face.corners.map((point) => projectScenePoint(point, transformState, mode));
          const averageDepth = face.corners
            .map((point) => rotateVectorByTransform(point, transformState).z)
            .reduce((sum, value) => sum + value, 0) / face.corners.length;
          return {
            visible: rotatedNormal.z > 0.001,
            averageDepth,
            points: projectedCorners.map((point) => roundSvg(point.x) + "," + roundSvg(point.y)).join(" ")
          };
        })
        .filter((face) => face.visible)
        .sort((a, b) => a.averageDepth - b.averageDepth);

      return faces
        .map((face) => "<polygon points=\"" + face.points + "\" fill=\"" + color + "\" />")
        .join("");
    }

    function buildExportRectPoint(size, point, color, transformState, mode) {
      const projected = projectScenePoint(point, transformState, mode);
      const scaleInfo = getPerspectiveScaleForPoint(point, transformState, mode);
      const scaledSize = Math.max(1, size * scaleInfo.totalScale);
      return "<rect x=\"" + roundSvg(projected.x - scaledSize / 2) + "\" y=\"" + roundSvg(projected.y - scaledSize / 2) +
        "\" width=\"" + roundSvg(scaledSize) + "\" height=\"" + roundSvg(scaledSize) + "\" fill=\"" + color + "\" />";
    }

    function buildExportPlanePoint(size, center, color, transformState, mode) {
      const half = size / 2;
      const corners = [
        { x: center.x - half, y: center.y - half, z: center.z || 0 },
        { x: center.x + half, y: center.y - half, z: center.z || 0 },
        { x: center.x + half, y: center.y + half, z: center.z || 0 },
        { x: center.x - half, y: center.y + half, z: center.z || 0 }
      ].map((point) => projectScenePoint(point, transformState, mode));

      return "<polygon points=\"" + corners
        .map((point) => roundSvg(point.x) + "," + roundSvg(point.y))
        .join(" ") + "\" fill=\"" + color + "\" />";
    }

    function buildExportLine(fromPoint, toPoint, thickness, color, transformState, mode) {
      const from = projectScenePoint(fromPoint, transformState, mode);
      const to = projectScenePoint(toPoint, transformState, mode);
      const midpoint = {
        x: (fromPoint.x + toPoint.x) / 2,
        y: (fromPoint.y + toPoint.y) / 2,
        z: (fromPoint.z + toPoint.z) / 2
      };
      const scaleInfo = getPerspectiveScaleForPoint(midpoint, transformState, mode);
      return "<line x1=\"" + roundSvg(from.x) + "\" y1=\"" + roundSvg(from.y) +
        "\" x2=\"" + roundSvg(to.x) + "\" y2=\"" + roundSvg(to.y) +
        "\" stroke=\"" + color + "\" stroke-width=\"" + roundSvg(Math.max(1, thickness * scaleInfo.totalScale)) +
        "\" stroke-linecap=\"round\" />";
    }

    function buildExportAxisSystem(mode, cubeSize, axisThickness, axes, origin, color = "#000000") {
      const transformState = sceneTransforms[mode];
      const flat = getPointStyle() === "flat";
      const parts = [];

      parts.push(buildExportBox(axes.xNeg + axes.xPos, axisThickness, axisThickness, origin.x + (axes.xPos - axes.xNeg) / 2, origin.y, 0, color, transformState, mode));
      parts.push(buildExportBox(axisThickness, axes.yNeg + axes.yPos, axisThickness, origin.x, origin.y + (axes.yPos - axes.yNeg) / 2, 0, color, transformState, mode));
      parts.push(buildExportBox(axisThickness, axisThickness, axes.zNeg + axes.zPos, origin.x, origin.y, (axes.zPos - axes.zNeg) / 2, color, transformState, mode));
      if (flat) {
        parts.push(buildExportRectPoint(cubeSize, { x: origin.x - axes.xNeg, y: origin.y, z: 0 }, "#000000", transformState, mode));
        parts.push(buildExportRectPoint(cubeSize, { x: origin.x + axes.xPos, y: origin.y, z: 0 }, "#000000", transformState, mode));
        parts.push(buildExportRectPoint(cubeSize, { x: origin.x, y: origin.y - axes.yNeg, z: 0 }, "#000000", transformState, mode));
        parts.push(buildExportRectPoint(cubeSize, { x: origin.x, y: origin.y + axes.yPos, z: 0 }, "#000000", transformState, mode));
        parts.push(buildExportRectPoint(cubeSize, { x: origin.x, y: origin.y, z: -axes.zNeg }, "#000000", transformState, mode));
        parts.push(buildExportRectPoint(cubeSize, { x: origin.x, y: origin.y, z: axes.zPos }, "#000000", transformState, mode));
      } else {
        parts.push(buildExportBox(cubeSize, cubeSize, cubeSize, origin.x - axes.xNeg, origin.y, 0, "#000000", transformState, mode));
        parts.push(buildExportBox(cubeSize, cubeSize, cubeSize, origin.x + axes.xPos, origin.y, 0, "#000000", transformState, mode));
        parts.push(buildExportBox(cubeSize, cubeSize, cubeSize, origin.x, origin.y - axes.yNeg, 0, "#000000", transformState, mode));
        parts.push(buildExportBox(cubeSize, cubeSize, cubeSize, origin.x, origin.y + axes.yPos, 0, "#000000", transformState, mode));
        parts.push(buildExportBox(cubeSize, cubeSize, cubeSize, origin.x, origin.y, -axes.zNeg, "#000000", transformState, mode));
        parts.push(buildExportBox(cubeSize, cubeSize, cubeSize, origin.x, origin.y, axes.zPos, "#000000", transformState, mode));
      }

      return parts.join("");
    }

    function buildExportGlyphStack(templateId, width, height, x, y, mode, options = {}) {
      const opacity = options.opacity == null ? 1 : options.opacity;
      return getGlyphLayerOffsets(state.glyphDepth)
        .map((zOffset) => buildExportGlyph(
          templateId,
          width,
          height,
          { x, y, z: zOffset },
          sceneTransforms[mode],
          mode,
          { opacity }
        ))
        .join("");
    }

    function buildExportFlatOverlayLine(line) {
      const x1 = Number.parseFloat(line.style.left || "0");
      const y1 = Number.parseFloat(line.style.top || "0");
      const length = Number.parseFloat(line.style.width || "0");
      const thickness = Number.parseFloat(line.style.height || "1");
      const transform = line.style.transform || "";
      const match = transform.match(/rotate\(([-0-9.]+)deg\)/);
      const angle = match ? toRadians(Number(match[1])) : 0;
      const color = line.style.getPropertyValue("--box-color") || "#000000";
      const x2 = x1 + Math.cos(angle) * length;
      const y2 = y1 + Math.sin(angle) * length;
      return "<line x1=\"" + roundSvg(x1) + "\" y1=\"" + roundSvg(y1) +
        "\" x2=\"" + roundSvg(x2) + "\" y2=\"" + roundSvg(y2) +
        "\" stroke=\"" + color + "\" stroke-width=\"" + roundSvg(thickness) +
        "\" stroke-linecap=\"butt\" />";
    }

    function buildExportFlatOverlayPoint(point) {
      const centerX = Number.parseFloat(point.style.left || "0");
      const centerY = Number.parseFloat(point.style.top || "0");
      const width = Number.parseFloat(point.style.width || "0");
      const height = Number.parseFloat(point.style.height || String(width));
      const color = point.style.getPropertyValue("--box-color") || "#000000";
      return "<rect x=\"" + roundSvg(centerX - width / 2) + "\" y=\"" + roundSvg(centerY - height / 2) +
        "\" width=\"" + roundSvg(width) + "\" height=\"" + roundSvg(height) + "\" fill=\"" + color + "\" />";
    }

    function buildExportFlatOverlayGlyph(wrapper) {
      const svg = wrapper.querySelector("svg");
      return svg ? svg.innerHTML : "";
    }

    function buildExportFlatOverlay(mode) {
      const overlay = scenes[mode].overlay;
      if (!overlay) {
        return "";
      }

      return Array.from(overlay.children)
        .map((element, index) => ({
          element,
          index,
          zIndex: Number(element.style.zIndex || "0")
        }))
        .sort((a, b) => a.zIndex === b.zIndex ? a.index - b.index : a.zIndex - b.zIndex)
        .map(({ element }) => {
          if (element.classList.contains("projection-line")) {
            return buildExportFlatOverlayLine(element);
          }
          if (element.classList.contains("projection-point")) {
            return buildExportFlatOverlayPoint(element);
          }
          if (element.classList.contains("projection-glyph")) {
            return buildExportFlatOverlayGlyph(element);
          }
          return "";
        })
        .join("");
    }

    function buildExportGrid() {
      if (!state.showGrid) {
        return "";
      }

      const padding = getGridPadding();
      const innerWidth = state.frame.width - padding * 2;
      const innerHeight = state.frame.height - padding * 2;
      const xPositions = [0.25, 0.5, 0.75].map((ratio) => padding + innerWidth * ratio);
      const yPositions = [0.25, 0.5, 0.75].map((ratio) => padding + innerHeight * ratio);
      const parts = [
        "<rect x=\"" + roundSvg(padding) + "\" y=\"" + roundSvg(padding) + "\" width=\"" + roundSvg(innerWidth) +
          "\" height=\"" + roundSvg(innerHeight) + "\" fill=\"none\" stroke=\"rgba(0,0,0,0.1)\" />"
      ];

      xPositions.forEach((x) => {
        parts.push("<line x1=\"" + roundSvg(x) + "\" y1=\"" + roundSvg(padding) + "\" x2=\"" + roundSvg(x) +
          "\" y2=\"" + roundSvg(padding + innerHeight) + "\" stroke=\"rgba(0,0,0,0.08)\" />");
      });
      yPositions.forEach((y) => {
        parts.push("<line x1=\"" + roundSvg(padding) + "\" y1=\"" + roundSvg(y) + "\" x2=\"" + roundSvg(padding + innerWidth) +
          "\" y2=\"" + roundSvg(y) + "\" stroke=\"rgba(0,0,0,0.08)\" />");
      });

      return parts.join("");
    }

    function getGlyphScenePointFromTemplateCoord(templateId, width, height, center, templateX, templateY) {
      const data = getTemplateData(templateId);
      const centerX = data.minX + data.width / 2;
      const centerY = data.minY + data.height / 2;
      return {
        x: center.x + (templateX - centerX) * (width / data.width),
        y: center.y + (templateY - centerY) * (height / data.height),
        z: center.z
      };
    }

    function getProjectedGlyphSupportDistance(templateId, width, height, center, transformState, mode, origin, direction) {
      const data = getTemplateData(templateId);
      const directionLength = Math.hypot(direction.x, direction.y);
      const fallbackProjected = projectScenePoint(center, transformState, mode);

      if (directionLength < 0.0001) {
        return {
          distance: 0,
          projected: fallbackProjected
        };
      }

      const nx = direction.x / directionLength;
      const ny = direction.y / directionLength;
      let bestDistance = -Infinity;
      let bestProjected = fallbackProjected;

      data.samplePoints.forEach((sample) => {
        const scenePoint = getGlyphScenePointFromTemplateCoord(templateId, width, height, center, sample.x, sample.y);
        const projected = projectScenePoint(scenePoint, transformState, mode);
        const projection = (projected.x - origin.x) * nx + (projected.y - origin.y) * ny;
        if (projection > bestDistance) {
          bestDistance = projection;
          bestProjected = projected;
        }
      });

      return {
        distance: Math.max(0, bestDistance),
        projected: bestProjected
      };
    }

    function getGlyphSupportDistanceFromBasis(templateId, width, height, basisX, basisY, direction) {
      const data = getTemplateData(templateId);
      const directionLength = Math.hypot(direction.x, direction.y);
      if (directionLength < 0.0001) {
        return {
          distance: 0,
          offset: { x: 0, y: 0 }
        };
      }

      const centerX = data.minX + data.width / 2;
      const centerY = data.minY + data.height / 2;
      const scaleX = width / data.width;
      const scaleY = height / data.height;
      const nx = direction.x / directionLength;
      const ny = direction.y / directionLength;
      let bestDistance = -Infinity;
      let bestOffset = { x: 0, y: 0 };

      data.samplePoints.forEach((sample) => {
        const localX = (sample.x - centerX) * scaleX;
        const localY = (sample.y - centerY) * scaleY;
        const offset = {
          x: basisX.x * localX + basisY.x * localY,
          y: basisX.y * localX + basisY.y * localY
        };
        const projection = offset.x * nx + offset.y * ny;
        if (projection > bestDistance) {
          bestDistance = projection;
          bestOffset = offset;
        }
      });

      return {
        distance: Math.max(0, bestDistance),
        offset: bestOffset
      };
    }

    function buildExportPerspectiveGlyph(templateId, width, height, center, transformState, mode, options = {}) {
      const data = getTemplateData(templateId);
      const opacity = options.opacity == null ? "" : " opacity=\"" + roundSvg(options.opacity, 3) + "\"";
      const cols = options.cols || 28;
      const rows = options.rows || 8;
      const clipOverlap = options.clipOverlap || 0;
      const patchWidth = data.width / cols;
      const patchHeight = data.height / rows;
      const clipPrefix = options.clipPrefix || ("clip-" + mode + "-" + Math.random().toString(36).slice(2));
      const defs = [];
      const fragments = [];

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          const x0 = data.minX + col * patchWidth;
          const y0 = data.minY + row * patchHeight;
          const x1 = col === cols - 1 ? data.minX + data.width : x0 + patchWidth;
          const y1 = row === rows - 1 ? data.minY + data.height : y0 + patchHeight;
          const p00 = projectScenePoint(getGlyphScenePointFromTemplateCoord(templateId, width, height, center, x0, y0), transformState, mode);
          const p10 = projectScenePoint(getGlyphScenePointFromTemplateCoord(templateId, width, height, center, x1, y0), transformState, mode);
          const p01 = projectScenePoint(getGlyphScenePointFromTemplateCoord(templateId, width, height, center, x0, y1), transformState, mode);
          const du = x1 - x0;
          const dv = y1 - y0;
          const a = (p10.x - p00.x) / du;
          const b = (p10.y - p00.y) / du;
          const c = (p01.x - p00.x) / dv;
          const d = (p01.y - p00.y) / dv;
          const determinant = Math.abs(a * d - b * c);

          if (determinant < 0.00001) {
            continue;
          }

          const e = p00.x - a * x0 - c * y0;
          const f = p00.y - b * x0 - d * y0;
          const clipId = clipPrefix + "-" + row + "-" + col;
          const clipX = Math.max(data.minX, x0 - clipOverlap);
          const clipY = Math.max(data.minY, y0 - clipOverlap);
          const clipRight = Math.min(data.minX + data.width, x1 + clipOverlap);
          const clipBottom = Math.min(data.minY + data.height, y1 + clipOverlap);
          defs.push(
            "<clipPath id=\"" + clipId + "\"><rect x=\"" + roundSvg(clipX, 4) + "\" y=\"" + roundSvg(clipY, 4) +
              "\" width=\"" + roundSvg(Math.max(0.0001, clipRight - clipX), 4) + "\" height=\"" + roundSvg(Math.max(0.0001, clipBottom - clipY), 4) + "\" /></clipPath>"
          );
          fragments.push(
            "<g" + opacity + " style=\"color:#000000\" clip-path=\"url(#" + clipId + ")\" transform=\"matrix(" +
              roundSvg(a, 5) + " " + roundSvg(b, 5) + " " +
              roundSvg(c, 5) + " " + roundSvg(d, 5) + " " +
              roundSvg(e, 4) + " " + roundSvg(f, 4) + ")\">" +
              data.markup +
              "</g>"
          );
        }
      }

      return {
        defs: defs.join(""),
        content: fragments.join("")
      };
    }

    function buildWordmarkPerspectiveSvgMarkup() {
      const cubeSize = getCubeSize("wordmark");
      const origin = getWordmarkOrigin(cubeSize);
      const defs = [];
      const parts = [
        "<?xml version=\"1.0\" encoding=\"UTF-8\"?>",
        "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"" + state.frame.width + "\" height=\"" + state.frame.height + "\" viewBox=\"0 0 " + state.frame.width + " " + state.frame.height + "\">",
        "<rect width=\"100%\" height=\"100%\" fill=\"#ffffff\" />",
        buildExportGrid()
      ];

      getGlyphLayerOffsets(state.glyphDepth).forEach((zOffset, index) => {
        const glyph = buildExportPerspectiveGlyph(
          "tpl-wordmark",
          430,
          430 * 45 / 169,
          { x: 0, y: 0, z: zOffset },
          sceneTransforms.wordmark,
          "wordmark",
          { clipPrefix: "wordmark-layer-" + index }
        );
        defs.push(glyph.defs);
        parts.push(glyph.content);
      });

      parts.push(getPointStyle() === "flat"
        ? buildExportPlanePoint(origin.size, { x: origin.x, y: origin.y, z: 0 }, "#000000", sceneTransforms.wordmark, "wordmark")
        : buildExportBox(origin.size, origin.size, origin.size, origin.x, origin.y, 0, "#000000", sceneTransforms.wordmark, "wordmark"));

      if (defs.length) {
        parts.splice(3, 0, "<defs>" + defs.join("") + "</defs>");
      }

      parts.push("</svg>");
      return parts.join("");
    }

    function buildCurrentSceneSvgMarkup() {
      const mode = state.mode;
      if (mode === "wordmark" && getPointStyle() !== "flat") {
        return buildWordmarkPerspectiveSvgMarkup();
      }

      if (mode === "wordmark" && getPointStyle() === "flat") {
        const cubeSize = getCubeSize("wordmark");
        const origin = getWordmarkOrigin(cubeSize);
        const defs = [];
        const parts = [
          "<?xml version=\"1.0\" encoding=\"UTF-8\"?>",
          "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"" + state.frame.width + "\" height=\"" + state.frame.height + "\" viewBox=\"0 0 " + state.frame.width + " " + state.frame.height + "\">",
          "<rect width=\"100%\" height=\"100%\" fill=\"#ffffff\" />",
          buildExportGrid()
        ];

        getGlyphLayerOffsets(state.glyphDepth).forEach((zOffset, index) => {
          const glyph = buildExportPerspectiveGlyph(
            "tpl-wordmark",
            430,
            430 * 45 / 169,
            { x: 0, y: 0, z: zOffset },
            sceneTransforms.wordmark,
            "wordmark",
            {
              clipPrefix: "wordmark-flat-layer-" + index,
              ...getWordmarkPerspectivePatchOptions()
            }
          );
          defs.push(glyph.defs);
          parts.push(glyph.content);
        });

        parts.push(buildExportPlanePoint(origin.size, { x: origin.x, y: origin.y, z: 0 }, "#000000", sceneTransforms.wordmark, "wordmark"));

        if (defs.length) {
          parts.splice(3, 0, "<defs>" + defs.join("") + "</defs>");
        }

        parts.push("</svg>");
        return parts.join("");
      }

      const cubeSize = getCubeSize(mode);
      const axisThickness = getAxisThickness(cubeSize, getAxisRatio(mode));
      const parts = [
        "<?xml version=\"1.0\" encoding=\"UTF-8\"?>",
        "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"" + state.frame.width + "\" height=\"" + state.frame.height + "\" viewBox=\"0 0 " + state.frame.width + " " + state.frame.height + "\">",
        "<rect width=\"100%\" height=\"100%\" fill=\"#ffffff\" />",
        buildExportGrid()
      ];

      if (mode === "wordmark") {
        const origin = getWordmarkOrigin(cubeSize);
        parts.push(buildExportGlyphStack("tpl-wordmark", 430, 430 * 45 / 169, 0, 0, "wordmark"));
        parts.push(getPointStyle() === "flat"
          ? buildExportPlanePoint(origin.size, { x: origin.x, y: origin.y, z: 0 }, "#000000", sceneTransforms.wordmark, "wordmark")
          : buildExportBox(origin.size, origin.size, origin.size, origin.x, origin.y, 0, "#000000", sceneTransforms.wordmark, "wordmark"));
      } else if (mode === "symbol") {
        if (getPointStyle() === "flat") {
          parts.push(buildExportFlatOverlay("symbol"));
          parts.push("</svg>");
          return parts.join("");
        }

        const axes = getSymbolAxes();
        const origin = getCenteredOrigin(cubeSize);
        const unit = state.symbolOSize / 38.96;
        const oWidth = 145.593 * unit;
        const oHeight = 145.593 * unit;
        const oCenterX = origin.x - axes.xNeg - cubeSize / 2 - state.symbolGap - oWidth / 2;
        parts.push(buildExportGlyphStack("tpl-o", oWidth, oHeight, oCenterX, origin.y, "symbol"));
        parts.push(buildExportAxisSystem("symbol", cubeSize, axisThickness, axes, origin, "#000000"));
      } else if (mode === "extended") {
        if (getPointStyle() === "flat") {
          parts.push(buildExportFlatOverlay("extended"));
          parts.push("</svg>");
          return parts.join("");
        }

        const axes = { ...state.extendedAxes };
        const origin = getCenteredOrigin(cubeSize);
        const unit = getExtendedUnitForTargetOArea(origin, axes, sceneTransforms.extended);
        const geometry = getExtendedProjectedOGeometry(unit, origin, axes);
        parts.push(buildExportGlyphStack("tpl-o", geometry.oWidth, geometry.oHeight, geometry.oCenter.x, geometry.oCenter.y, "extended"));
        if (state.extendedLabVisible) {
          parts.push(buildExportGlyphStack("tpl-lab", geometry.labWidth, geometry.labHeight, geometry.labCenter.x, geometry.labCenter.y, "extended"));
        }
        parts.push(buildExportAxisSystem("extended", cubeSize, axisThickness, axes, origin, "#BEBEBE"));
      }

      parts.push("</svg>");
      return parts.join("");
    }

    function setTemporaryButtonLabel(button, label, originalLabel) {
      button.textContent = label;
      window.setTimeout(() => {
        button.textContent = originalLabel;
      }, 1200);
    }

    async function copySvgToClipboard() {
      const svgMarkup = buildCurrentSceneSvgMarkup();
      if (navigator.clipboard && window.ClipboardItem && navigator.clipboard.write) {
        const svgBlob = new Blob([svgMarkup], { type: "image/svg+xml" });
        const textBlob = new Blob([svgMarkup], { type: "text/plain" });
        await navigator.clipboard.write([new ClipboardItem({
          "image/svg+xml": svgBlob,
          "text/plain": textBlob
        })]);
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(svgMarkup);
        return;
      }

      const helper = document.createElement("textarea");
      helper.value = svgMarkup;
      helper.setAttribute("readonly", "readonly");
      helper.style.position = "absolute";
      helper.style.left = "-9999px";
      document.body.appendChild(helper);
      helper.select();
      document.execCommand("copy");
      document.body.removeChild(helper);
    }

    function downloadCurrentSceneSvg() {
      const svgMarkup = buildCurrentSceneSvgMarkup();
      const blob = new Blob([svgMarkup], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const stamp = new Date().toISOString().replaceAll(":", "-").slice(0, 19);
      link.href = url;
      link.download = "olab-" + state.mode + "-" + stamp + ".svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function getGridSnapTargets() {
      const padding = getGridPadding();
      const innerWidth = state.frame.width - padding * 2;
      const innerHeight = state.frame.height - padding * 2;
      const ratios = [0.25, 0.5, 0.75];
      const points = [];

      ratios.forEach((xRatio) => {
        ratios.forEach((yRatio) => {
          const x = padding + innerWidth * xRatio;
          const y = padding + innerHeight * yRatio;
          points.push({
            panX: x - state.frame.width / 2,
            panY: y - state.frame.height / 2
          });
        });
      });

      return points;
    }

    function getNearestGridSnapTarget(panX, panY) {
      const targets = getGridSnapTargets();
      let nearest = targets[0];
      let nearestIndex = 0;
      let nearestDistance = Infinity;

      targets.forEach((target, index) => {
        const dx = panX - target.panX;
        const dy = panY - target.panY;
        const distance = dx * dx + dy * dy;
        if (distance < nearestDistance) {
          nearest = target;
          nearestIndex = index;
          nearestDistance = distance;
        }
      });

      return { ...nearest, index: nearestIndex };
    }

    function snapExtendedPanToGrid(panX, panY) {
      const nearest = getNearestGridSnapTarget(panX, panY);
      state.extendedGridSnapTarget = nearest.index;
      return nearest;
    }

    function getExtendedEdgeMetrics(cubeSize = getCubeSize("extended")) {
      const unit = cubeSize / 38.96;
      return {
        oWidth: 145.593 * unit,
        leftGap: 57.153 * unit,
        labWidth: 363.576 * unit,
        rightGap: 70.72 * unit
      };
    }

    function getExtendedRepresentativePoint(key, axisLength, cubeSize = getCubeSize("extended")) {
      const metrics = getExtendedEdgeMetrics(cubeSize);
      const halfCube = cubeSize / 2;

      switch (key) {
        case "xNeg":
          return {
            x: -(axisLength + halfCube + metrics.leftGap + metrics.oWidth),
            y: 0,
            z: 0
          };
        case "xPos":
          return {
            x: state.extendedLabVisible
              ? axisLength + halfCube + metrics.rightGap + metrics.labWidth
              : axisLength + halfCube,
            y: 0,
            z: 0
          };
        case "yNeg":
          return { x: 0, y: -(axisLength + halfCube), z: 0 };
        case "yPos":
          return { x: 0, y: axisLength + halfCube, z: 0 };
        case "zNeg":
          return { x: 0, y: 0, z: -(axisLength + halfCube) };
        case "zPos":
          return { x: 0, y: 0, z: axisLength + halfCube };
        default:
          return { x: 0, y: 0, z: 0 };
      }
    }

    function getExtendedEndpointPoint3D(key, axisLength) {
      switch (key) {
        case "xNeg":
          return { x: -axisLength, y: 0, z: 0 };
        case "xPos":
          return { x: axisLength, y: 0, z: 0 };
        case "yNeg":
          return { x: 0, y: -axisLength, z: 0 };
        case "yPos":
          return { x: 0, y: axisLength, z: 0 };
        case "zNeg":
          return { x: 0, y: 0, z: -axisLength };
        case "zPos":
          return { x: 0, y: 0, z: axisLength };
        default:
          return { x: 0, y: 0, z: 0 };
      }
    }

    function getFlatExtendedAxisDirection(key, transformState) {
      const origin = projectScenePoint({ x: 0, y: 0, z: 0 }, transformState, "extended");
      const samplePoint = projectScenePoint(getExtendedEndpointPoint3D(key, 1), transformState, "extended");
      let dx = samplePoint.x - origin.x;
      let dy = samplePoint.y - origin.y;
      let length = Math.hypot(dx, dy);

      if (length < 0.0001) {
        const rotated = rotateVectorByTransform(getEndpointDirection(key), transformState);
        dx = rotated.x;
        dy = rotated.y;
        length = Math.hypot(dx, dy);
      }

      if (length < 0.0001) {
        const fallback = {
          xNeg: { x: -1, y: 0 },
          xPos: { x: 1, y: 0 },
          yNeg: { x: 0, y: -1 },
          yPos: { x: 0, y: 1 },
          zNeg: { x: 0, y: -1 },
          zPos: { x: 0, y: 1 }
        }[key] || { x: 1, y: 0 };
        return fallback;
      }

      return {
        x: dx / length,
        y: dy / length
      };
    }

    function getExtendedAxisRayProjection(key, axisLength, transformState) {
      const origin = projectScenePoint({ x: 0, y: 0, z: 0 }, transformState, "extended");
      const direction = getFlatExtendedAxisDirection(key, transformState);
      const distance = axisLength * (transformState.scale || 1);
      return {
        origin,
        projected: {
          x: origin.x + direction.x * distance,
          y: origin.y + direction.y * distance
        },
        distance,
        direction
      };
    }

    function getDisplayedExtendedAxisProjection(key, axisLength, transformState) {
      const origin = projectScenePoint({ x: 0, y: 0, z: 0 }, transformState, "extended");
      const projected = projectScenePoint(getExtendedEndpointPoint3D(key, axisLength), transformState, "extended");
      let dx = projected.x - origin.x;
      let dy = projected.y - origin.y;
      let length = Math.hypot(dx, dy);

      if (length < 0.0001) {
        const fallback = getFlatExtendedAxisDirection(key, transformState);
        dx = fallback.x;
        dy = fallback.y;
        length = Math.hypot(dx, dy);
      }

      const safeLength = Math.max(0.0001, length);
      return {
        origin,
        projected,
        distance: Math.hypot(projected.x - origin.x, projected.y - origin.y),
        direction: {
          x: dx / safeLength,
          y: dy / safeLength
        }
      };
    }

    function getFlatExtendedProjectedPointSize(key, axisLength, cubeSize, axisThickness, transformState) {
      const lineScreenThickness = Math.max(1, axisThickness * (transformState.scale || 1));
      const minPointSize = Math.max(state.extendedProjectedPointMin, lineScreenThickness);
      const maxPointSize = Math.max(minPointSize, state.extendedProjectedPointMax);
      return getProjectedPointDisplaySize(
        cubeSize,
        getExtendedEndpointPoint3D(key, axisLength),
        transformState,
        "extended",
        minPointSize,
        maxPointSize
      );
    }

    function getScreenSquareSupportDistance(size, direction) {
      const directionLength = Math.hypot(direction.x, direction.y);
      if (directionLength < 0.0001) {
        return size / 2;
      }

      const nx = direction.x / directionLength;
      const ny = direction.y / directionLength;
      return (size / 2) * (Math.abs(nx) + Math.abs(ny));
    }

    function getFlatExtendedGlyphPlacement(kind, axes, cubeSize, axisThickness, transformState, projectionMode = "display") {
      const origin3D = getCenteredOrigin(cubeSize);
      const isO = kind === "o";
      const axisKey = isO ? "xNeg" : "xPos";
      const templateId = isO ? "tpl-o" : "tpl-lab";
      const unit = getExtendedUnitForTargetOArea(origin3D, axes, transformState);
      const geometry = getExtendedProjectedOGeometry(unit, origin3D, axes);
      const screenMetrics = getExtendedFlatGlyphScreenMetrics();
      const width = isO ? geometry.oWidth : geometry.labWidth;
      const height = isO ? geometry.oHeight : geometry.labHeight;
      const gap = isO ? screenMetrics.leftGap : screenMetrics.rightGap;
      const axisProjection = projectionMode === "ray"
        ? getExtendedAxisRayProjection(axisKey, axes[axisKey], transformState)
        : getDisplayedExtendedAxisProjection(axisKey, axes[axisKey], transformState);
      const endpointSize = getFlatExtendedProjectedPointSize(axisKey, axes[axisKey], cubeSize, axisThickness, transformState);
      const endpointSupport = getScreenSquareSupportDistance(endpointSize, axisProjection.direction);
      const referenceCenter = isO ? geometry.oCenter : geometry.labCenter;

      if (projectionMode === "ray") {
        const basis = getProjectedGlyphBasis(referenceCenter, transformState, "extended");
        const inwardDirection = {
          x: -axisProjection.direction.x,
          y: -axisProjection.direction.y
        };
        const nearSupport = getGlyphSupportDistanceFromBasis(
          templateId,
          width,
          height,
          basis.basisX,
          basis.basisY,
          inwardDirection
        );
        const outwardSupport = getGlyphSupportDistanceFromBasis(
          templateId,
          width,
          height,
          basis.basisX,
          basis.basisY,
          axisProjection.direction
        );
        const centerDistance = endpointSupport + gap + nearSupport.distance;
        const screenCenter = {
          x: axisProjection.projected.x + axisProjection.direction.x * centerDistance,
          y: axisProjection.projected.y + axisProjection.direction.y * centerDistance
        };
        const outerPoint = {
          x: screenCenter.x + axisProjection.direction.x * outwardSupport.distance,
          y: screenCenter.y + axisProjection.direction.y * outwardSupport.distance
        };

        return {
          width,
          height,
          center: referenceCenter,
          centerProjected: screenCenter,
          screenCenter,
          basisX: basis.basisX,
          basisY: basis.basisY,
          outerPoint,
          outerDistance: Math.max(
            0,
            (outerPoint.x - axisProjection.origin.x) * axisProjection.direction.x +
            (outerPoint.y - axisProjection.origin.y) * axisProjection.direction.y
          ),
          axisProjection
        };
      }

      const inwardDirection = {
        x: -axisProjection.direction.x,
        y: -axisProjection.direction.y
      };
      const endpointX = origin3D.x + (isO ? -axes[axisKey] : axes[axisKey]);
      const directionSign = isO ? -1 : 1;

      const evaluateOffset = (offset) => {
        const center = {
          x: endpointX + directionSign * offset,
          y: origin3D.y,
          z: 0
        };
        const centerProjected = projectScenePoint(center, transformState, "extended");
        const nearSupport = getProjectedGlyphSupportDistance(
          templateId,
          width,
          height,
          center,
          transformState,
          "extended",
          centerProjected,
          inwardDirection
        );
        const outwardSupport = getProjectedGlyphSupportDistance(
          templateId,
          width,
          height,
          center,
          transformState,
          "extended",
          centerProjected,
          axisProjection.direction
        );
        const centerDistance =
          (centerProjected.x - axisProjection.projected.x) * axisProjection.direction.x +
          (centerProjected.y - axisProjection.projected.y) * axisProjection.direction.y;
        const nearEdgeDistance = centerDistance - nearSupport.distance;
        const desiredNearEdgeDistance = endpointSupport + gap;
        const outerPoint = {
          x: centerProjected.x + axisProjection.direction.x * outwardSupport.distance,
          y: centerProjected.y + axisProjection.direction.y * outwardSupport.distance
        };

        return {
          center,
          centerProjected,
          outerPoint,
          outerDistance:
            (outerPoint.x - axisProjection.origin.x) * axisProjection.direction.x +
            (outerPoint.y - axisProjection.origin.y) * axisProjection.direction.y,
          error: nearEdgeDistance - desiredNearEdgeDistance
        };
      };

      const defaultCenter = referenceCenter;
      let low = 0;
      let high = Math.max(1, Math.abs(defaultCenter.x - endpointX));
      let highEvaluation = evaluateOffset(high);

      while (high < EXTENDED_AXIS_LIMIT && highEvaluation.error < 0) {
        low = high;
        high = Math.min(EXTENDED_AXIS_LIMIT, Math.max(high + 1, Math.ceil(high * 1.35)));
        highEvaluation = evaluateOffset(high);
      }

      for (let i = 0; i < 20; i += 1) {
        const middle = (low + high) / 2;
        const evaluation = evaluateOffset(middle);
        if (evaluation.error >= 0) {
          high = middle;
          highEvaluation = evaluation;
        } else {
          low = middle;
        }
      }

      return {
        width,
        height,
        center: highEvaluation.center,
        centerProjected: highEvaluation.centerProjected,
        outerPoint: highEvaluation.outerPoint,
        outerDistance: Math.max(0, highEvaluation.outerDistance),
        axisProjection
      };
    }

    function intersectRayWithRect(origin, direction, rect) {
      const intersections = [];
      const epsilon = 0.0001;

      if (Math.abs(direction.x) > epsilon) {
        [rect.left, rect.right].forEach((x) => {
          const t = (x - origin.x) / direction.x;
          if (t > 0) {
            const y = origin.y + direction.y * t;
            if (y >= rect.top - 0.5 && y <= rect.bottom + 0.5) {
              intersections.push({ x, y, t });
            }
          }
        });
      }

      if (Math.abs(direction.y) > epsilon) {
        [rect.top, rect.bottom].forEach((y) => {
          const t = (y - origin.y) / direction.y;
          if (t > 0) {
            const x = origin.x + direction.x * t;
            if (x >= rect.left - 0.5 && x <= rect.right + 0.5) {
              intersections.push({ x, y, t });
            }
          }
        });
      }

      intersections.sort((a, b) => a.t - b.t);
      return intersections[0] || null;
    }

    function getProjectedAxisDistance(key, axisLength) {
      if (getPointStyle() === "flat") {
        const transformState = sceneTransforms.extended;
        const cubeSize = getCubeSize("extended");
        const axisThickness = getAxisThickness(cubeSize, getAxisRatio("extended"));
        const axes = { ...state.extendedAxes, [key]: axisLength };
        const projection = getExtendedAxisRayProjection(key, axisLength, transformState);
        const endpointSize = getFlatExtendedProjectedPointSize(key, axisLength, cubeSize, axisThickness, transformState);
        const endpointSupport = getScreenSquareSupportDistance(endpointSize, projection.direction);
        const endpointDistance = projection.distance + endpointSupport;
        const endpointProjected = {
          x: projection.origin.x + projection.direction.x * endpointDistance,
          y: projection.origin.y + projection.direction.y * endpointDistance
        };

        if (key === "xNeg") {
          const oPlacement = getFlatExtendedGlyphPlacement("o", axes, cubeSize, axisThickness, transformState, "ray");
          return {
            origin: projection.origin,
            projected: oPlacement.outerDistance >= endpointDistance ? oPlacement.outerPoint : endpointProjected,
            distance: Math.max(endpointDistance, oPlacement.outerDistance),
            direction: projection.direction
          };
        }

        if (key === "xPos" && state.extendedLabVisible) {
          const labPlacement = getFlatExtendedGlyphPlacement("lab", axes, cubeSize, axisThickness, transformState, "ray");
          return {
            origin: projection.origin,
            projected: labPlacement.outerDistance >= endpointDistance ? labPlacement.outerPoint : endpointProjected,
            distance: Math.max(endpointDistance, labPlacement.outerDistance),
            direction: projection.direction
          };
        }

        return {
          origin: projection.origin,
          projected: endpointProjected,
          distance: endpointDistance,
          direction: projection.direction
        };
      }

      const origin = projectScenePoint({ x: 0, y: 0, z: 0 }, sceneTransforms.extended, "extended");
      const point = getExtendedRepresentativePoint(key, axisLength);
      const projected = projectScenePoint(point, sceneTransforms.extended, "extended");
      let dx = projected.x - origin.x;
      let dy = projected.y - origin.y;
      let direction = { x: dx, y: dy };
      let distance = Math.hypot(dx, dy);

      if (key === "xNeg" || (key === "xPos" && state.extendedLabVisible)) {
        const cubeSize = getCubeSize("extended");
        const origin3D = getCenteredOrigin(cubeSize);
        const axes = { ...state.extendedAxes, [key]: axisLength };
        const unit = getExtendedUnitForTargetOArea(origin3D, axes, sceneTransforms.extended);
        const geometry = getExtendedProjectedOGeometry(unit, origin3D, axes);
        const targetCenter = key === "xNeg" ? geometry.oCenter : geometry.labCenter;
        const targetWidth = key === "xNeg" ? geometry.oWidth : geometry.labWidth;
        const targetHeight = key === "xNeg" ? geometry.oHeight : geometry.labHeight;
        const centerProjected = projectScenePoint(targetCenter, sceneTransforms.extended, "extended");
        const centerDirection = {
          x: centerProjected.x - origin.x,
          y: centerProjected.y - origin.y
        };
        const centerDirectionLength = Math.hypot(centerDirection.x, centerDirection.y);

        if (centerDirectionLength > 0.0001) {
          const support = getProjectedGlyphSupportDistance(
            key === "xNeg" ? "tpl-o" : "tpl-lab",
            targetWidth,
            targetHeight,
            targetCenter,
            sceneTransforms.extended,
            "extended",
            origin,
            centerDirection
          );

          direction = centerDirection;
          distance = support.distance;
          projected.x = support.projected.x;
          projected.y = support.projected.y;
          dx = projected.x - origin.x;
          dy = projected.y - origin.y;
        }
      }

      return {
        origin,
        projected,
        distance,
        direction
      };
    }

    function getProjectedAxisFitEvaluation(key, axisLength, rect) {
      const projection = getProjectedAxisDistance(key, axisLength);
      const directionLength = Math.hypot(projection.direction.x, projection.direction.y);

      if (directionLength < 0.001) {
        return {
          valid: false,
          gap: -Infinity,
          targetDistance: 0,
          projection
        };
      }

      const targetPoint = intersectRayWithRect(projection.origin, projection.direction, rect);
      if (!targetPoint) {
        return {
          valid: false,
          gap: -Infinity,
          targetDistance: 0,
          projection
        };
      }

      const targetDistance = Math.hypot(
        targetPoint.x - projection.origin.x,
        targetPoint.y - projection.origin.y
      );

      return {
        valid: true,
        gap: projection.distance - targetDistance,
        targetDistance,
        projection
      };
    }

    function solveExtendedAxisToGridEdge(key) {
      const currentLength = state.extendedAxes[key];
      const rect = getGridRect();
      const maxAxisLength = EXTENDED_AXIS_LIMIT;
      const fitTolerance = 0.05;
      const currentEvaluation = getProjectedAxisFitEvaluation(key, currentLength, rect);

      if (!currentEvaluation.valid) {
        return currentLength;
      }

      let low = 0;
      let high = Math.max(1, currentLength);
      let highEvaluation = getProjectedAxisFitEvaluation(key, high, rect);

      while (high < maxAxisLength && (!highEvaluation.valid || highEvaluation.gap < -fitTolerance)) {
        low = high;
        high = Math.min(maxAxisLength, Math.max(high + 1, Math.ceil(high * 1.4)));
        highEvaluation = getProjectedAxisFitEvaluation(key, high, rect);
      }

      if (!highEvaluation.valid || highEvaluation.gap < -fitTolerance) {
        return high;
      }

      for (let i = 0; i < 28; i += 1) {
        const middle = (low + high) / 2;
        const middleEvaluation = getProjectedAxisFitEvaluation(key, middle, rect);
        if (middleEvaluation.valid && middleEvaluation.gap >= -fitTolerance) {
          high = middle;
        } else {
          low = middle;
        }
      }

      let bestLength = Math.min(maxAxisLength, Math.max(0, Math.round(high)));
      let bestError = Infinity;

      for (let offset = -3; offset <= 3; offset += 1) {
        const candidate = Math.min(maxAxisLength, Math.max(0, bestLength + offset));
        const candidateEvaluation = getProjectedAxisFitEvaluation(key, candidate, rect);
        if (!candidateEvaluation.valid) {
          continue;
        }
        const error = Math.abs(candidateEvaluation.gap);
        if (
          error < bestError - 0.0001 ||
          (Math.abs(error - bestError) < 0.0001 && candidateEvaluation.gap >= -fitTolerance)
        ) {
          bestLength = candidate;
          bestError = error;
        }
      }

      return bestLength;
    }

    function fitExtendedAxesToGrid() {
      if (state.mode !== "extended" || activeTransition || isExtendedAnimating()) {
        return;
      }

      state.extendedFitDisplay = true;
      ["xNeg", "xPos", "yNeg", "yPos", "zNeg", "zPos"].forEach((key) => {
        state.extendedAxes[key] = solveExtendedAxisToGridEdge(key);
      });

      renderAllScenes();
    }

    function getProjectedAxisAngle(vectorA, vectorB) {
      const dot = vectorA.x * vectorB.x + vectorA.y * vectorB.y;
      const magA = Math.hypot(vectorA.x, vectorA.y);
      const magB = Math.hypot(vectorB.x, vectorB.y);
      if (magA < 0.0001 || magB < 0.0001) {
        return 0;
      }

      const cosine = Math.max(-1, Math.min(1, dot / (magA * magB)));
      const angle = Math.acos(cosine) * 180 / Math.PI;
      return Math.min(angle, 180 - angle);
    }

    function hasValidExtendedProjectedAxisAngles(rotation, minimumAngle = 25) {
      const transform = {
        ...sceneTransforms.extended,
        x: rotation.x,
        y: rotation.y,
        z: rotation.z
      };
      const projectedAxes = [
        rotateVectorByTransform({ x: 1, y: 0, z: 0 }, transform),
        rotateVectorByTransform({ x: 0, y: 1, z: 0 }, transform),
        rotateVectorByTransform({ x: 0, y: 0, z: 1 }, transform)
      ].map((vector) => ({ x: vector.x, y: vector.y }));

      const angles = [
        getProjectedAxisAngle(projectedAxes[0], projectedAxes[1]),
        getProjectedAxisAngle(projectedAxes[0], projectedAxes[2]),
        getProjectedAxisAngle(projectedAxes[1], projectedAxes[2])
      ];

      return angles.every((angle) => angle > minimumAngle);
    }

    function hasValidExtendedXOrdering(rotation) {
      if (!state.extendedLabVisible) {
        return true;
      }

      const transform = {
        ...sceneTransforms.extended,
        x: rotation.x,
        y: rotation.y,
        z: rotation.z
      };
      const leftProjected = projectScenePoint({ x: -1, y: 0, z: 0 }, transform, "extended");
      const rightProjected = projectScenePoint({ x: 1, y: 0, z: 0 }, transform, "extended");
      return leftProjected.x < rightProjected.x;
    }

    function hasValidExtendedViewAlignment(rotation, maximumViewDot = 0.85) {
      const transform = {
        ...sceneTransforms.extended,
        x: rotation.x,
        y: rotation.y,
        z: rotation.z
      };
      const xDir = rotateVectorByTransform({ x: 1, y: 0, z: 0 }, transform);
      const zDir = rotateVectorByTransform({ x: 0, y: 0, z: 1 }, transform);
      return Math.abs(xDir.z) < maximumViewDot && Math.abs(zDir.z) < maximumViewDot;
    }

    function getRandomExtendedRotation() {
      let fallbackRotation = null;
      let fallbackScore = Infinity;

      for (let attempt = 0; attempt < 240; attempt += 1) {
        const rotation = {
          x: -30 + Math.random() * 60,
          y: Math.random() * 180,
          z: 0
        };

        const transform = {
          ...sceneTransforms.extended,
          x: rotation.x,
          y: rotation.y,
          z: rotation.z
        };
        const xDir = rotateVectorByTransform({ x: 1, y: 0, z: 0 }, transform);
        const zDir = rotateVectorByTransform({ x: 0, y: 0, z: 1 }, transform);
        const viewScore = Math.max(Math.abs(xDir.z), Math.abs(zDir.z));

        if (viewScore < fallbackScore) {
          fallbackScore = viewScore;
          fallbackRotation = rotation;
        }

        if (
          hasValidExtendedProjectedAxisAngles(rotation, 25)
          && hasValidExtendedXOrdering(rotation)
          && hasValidExtendedViewAlignment(rotation, 0.85)
        ) {
          return rotation;
        }
      }

      return fallbackRotation || {
        x: 0,
        y: 0,
        z: 0
      };
    }

    function getFittedExtendedAxesForTransform(targetTransform) {
      const previousTransform = { ...sceneTransforms.extended };
      const previousAxes = { ...state.extendedAxes };
      const fittedAxes = {};

      Object.assign(sceneTransforms.extended, targetTransform);
      Object.assign(state.extendedAxes, previousAxes);

      ["xNeg", "xPos", "yNeg", "yPos", "zNeg", "zPos"].forEach((key) => {
        fittedAxes[key] = solveExtendedAxisToGridEdge(key);
        state.extendedAxes[key] = previousAxes[key];
      });

      Object.assign(sceneTransforms.extended, previousTransform);
      Object.assign(state.extendedAxes, previousAxes);
      return fittedAxes;
    }

    function animateExtendedLayout(targetTransform, targetAxes, targetSnapTarget) {
      if (extendedLayoutFrame) {
        window.cancelAnimationFrame(extendedLayoutFrame);
      }

      const fromTransform = { ...sceneTransforms.extended };
      const fromAxes = { ...state.extendedAxes };
      const duration = 640;
      const startTime = performance.now();

      state.extendedGridSnapTarget = null;
      extendedLayoutAnimation = {
        fromTransform,
        toTransform: { ...targetTransform },
        fromAxes,
        toAxes: { ...targetAxes }
      };

      function step(now) {
        const raw = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - raw, 3);
        const interpolatedTransform = interpolateTransform(fromTransform, targetTransform, eased);
        const interpolatedAxes = interpolateAxes(fromAxes, targetAxes, eased);

        Object.assign(sceneTransforms.extended, interpolatedTransform);
        Object.entries(interpolatedAxes).forEach(([key, value]) => {
          state.extendedAxes[key] = Math.round(value);
        });
        renderAllScenes();

        if (raw < 1) {
          extendedLayoutFrame = window.requestAnimationFrame(step);
        } else {
          extendedLayoutAnimation = null;
          extendedLayoutFrame = null;
          Object.assign(sceneTransforms.extended, targetTransform);
          Object.assign(state.extendedAxes, targetAxes);
          state.extendedGridSnapTarget = targetSnapTarget;
          renderAllScenes();
        }
      }

      extendedLayoutFrame = window.requestAnimationFrame(step);
    }

    function applyExtendedRandomLayout() {
      if (state.mode !== "extended" || activeTransition || isExtendedAnimating()) {
        return;
      }

      const targets = getGridSnapTargets();
      const index = Math.floor(Math.random() * targets.length);
      const target = targets[index];
      const rotation = getRandomExtendedRotation();
      const targetTransform = {
        ...sceneTransforms.extended,
        panX: target.panX,
        panY: target.panY,
        x: rotation.x,
        y: rotation.y,
        z: rotation.z
      };
      const targetAxes = getFittedExtendedAxesForTransform(targetTransform);

      state.extendedFitDisplay = true;
      animateExtendedLayout(targetTransform, targetAxes, index);
    }

    function updateExtendedEndpointOverlay() {
      const isVisible = state.mode === "extended" && !activeTransition;
      extendedEndpointOverlay.style.display = isVisible ? "block" : "none";

      if (!isVisible) {
        return;
      }

      const axes = state.extendedAxes;
      const points = {
        xNeg: { x: -axes.xNeg, y: 0, z: 0 },
        xPos: { x: axes.xPos, y: 0, z: 0 },
        yNeg: { x: 0, y: -axes.yNeg, z: 0 },
        yPos: { x: 0, y: axes.yPos, z: 0 },
        zNeg: { x: 0, y: 0, z: -axes.zNeg },
        zPos: { x: 0, y: 0, z: axes.zPos }
      };

      Object.entries(points).forEach(([key, point]) => {
        const projected = getPointStyle() === "flat"
          ? (shouldUseFlatExtendedRayDisplay()
            ? getExtendedAxisRayProjection(key, axes[key], sceneTransforms.extended).projected
            : getDisplayedExtendedAxisProjection(key, axes[key], sceneTransforms.extended).projected)
          : projectScenePoint(point, sceneTransforms.extended, "extended");
        const handle = endpointHandleMap[key];
        const isInside =
          projected.x >= -24 &&
          projected.x <= state.frame.width + 24 &&
          projected.y >= -24 &&
          projected.y <= state.frame.height + 24;

        handle.classList.toggle("is-hidden", !isInside);
        handle.style.left = projected.x.toFixed(2) + "px";
        handle.style.top = projected.y.toFixed(2) + "px";
      });
    }

    function handleExtendedEndpointDragMove(event) {
      if (!endpointDragState) {
        return;
      }

      const dx = event.clientX - endpointDragState.startX;
      const dy = event.clientY - endpointDragState.startY;
      const direction = getPointStyle() === "flat"
        ? getExtendedAxisRayProjection(
          endpointDragState.key,
          Math.max(1, endpointDragState.startLength),
          sceneTransforms.extended
        ).direction
        : (() => {
          const screenVector = rotateVectorByTransform(getEndpointDirection(endpointDragState.key), sceneTransforms.extended);
          const projectedLength = Math.hypot(screenVector.x, screenVector.y) || 1;
          return {
            x: screenVector.x / projectedLength,
            y: screenVector.y / projectedLength
          };
        })();
      const projectedDelta = dx * direction.x + dy * direction.y;
      const scale = sceneTransforms.extended.scale || 1;
      state.extendedAxes[endpointDragState.key] = Math.round(clampNumber(
        endpointDragState.startLength + projectedDelta / scale,
        0,
        EXTENDED_AXIS_LIMIT,
        endpointDragState.startLength
      ));

      refreshExtendedLiveFitOrRender();
      event.preventDefault();
    }

    function stopExtendedEndpointDrag() {
      if (!endpointDragState) {
        return;
      }

      window.removeEventListener("pointermove", handleExtendedEndpointDragMove);
      window.removeEventListener("pointerup", stopExtendedEndpointDrag);
      window.removeEventListener("pointercancel", stopExtendedEndpointDrag);
      if (endpointDragState.handle) {
        endpointDragState.handle.classList.remove("is-active");
        hoveredEndpointKey = endpointDragState.handle.matches(":hover") ? endpointDragState.key : null;
      }
      endpointDragState = null;
      syncEndpointCubeClasses();
    }

    function attachExtendedHandle(key, box) {
      box.classList.add("handle-cube");
      endpointCubeMap[key] = box;
      syncEndpointCubeClasses();
      box.dataset.endpoint = key;
      box.addEventListener("pointerenter", () => {
        hoveredEndpointKey = key;
        syncEndpointCubeClasses();
      });
      box.addEventListener("pointerleave", () => {
        if (!endpointDragState && hoveredEndpointKey === key) {
          hoveredEndpointKey = null;
          syncEndpointCubeClasses();
        }
      });
      box.addEventListener("pointerdown", (event) => {
        if (event.button !== 0 || state.mode !== "extended" || activeTransition || isExtendedAnimating()) {
          return;
        }

        endpointDragState = {
          key,
          handle: endpointHandleMap[key],
          startX: event.clientX,
          startY: event.clientY,
          startLength: state.extendedAxes[key]
        };

        if (endpointDragState.handle) {
          endpointDragState.handle.classList.add("is-active");
        }
        hoveredEndpointKey = key;
        syncEndpointCubeClasses();
        window.addEventListener("pointermove", handleExtendedEndpointDragMove);
        window.addEventListener("pointerup", stopExtendedEndpointDrag);
        window.addEventListener("pointercancel", stopExtendedEndpointDrag);
        event.stopPropagation();
        event.preventDefault();
      });
    }

    function getRandomSymbolRotation() {
      const pick = (values) => values[Math.floor(Math.random() * values.length)];
      return {
        x: pick([45, -45]),
        y: pick([45, -45]),
        z: pick([0, 180])
      };
    }

    function getRandomWordmarkRotation() {
      const pick = (values) => values[Math.floor(Math.random() * values.length)];
      return {
        x: pick([-45, 0, 45]),
        y: pick([-45, 0, 45]),
        z: 0
      };
    }

    function getRandomWordmarkRangeRotation(referenceRotations = [], minimumDelta = 0) {
      const randomInRange = () => Math.random() * 110 - 55;
      let bestCandidate = null;
      let bestDistance = -Infinity;
      const references = (Array.isArray(referenceRotations) ? referenceRotations : [referenceRotations])
        .filter(Boolean);

      for (let attempt = 0; attempt < 24; attempt += 1) {
        const candidate = {
          x: randomInRange(),
          y: randomInRange(),
          z: 0
        };

        if (!references.length || minimumDelta <= 0) {
          return candidate;
        }

        const distance = Math.min(...references.map((referenceRotation) => {
          const deltaX = candidate.x - referenceRotation.x;
          const deltaY = candidate.y - referenceRotation.y;
          return Math.hypot(deltaX, deltaY);
        }));

        if (distance >= minimumDelta) {
          return candidate;
        }

        if (distance > bestDistance) {
          bestDistance = distance;
          bestCandidate = candidate;
        }
      }

      return bestCandidate || {
        x: randomInRange(),
        y: randomInRange(),
        z: 0
      };
    }

    function getWordmarkProjectedBounds(transformState) {
      const wordmarkWidth = 430;
      const wordmarkHeight = wordmarkWidth * 45 / 169;
      const halfWidth = wordmarkWidth / 2;
      const halfHeight = wordmarkHeight / 2;
      const sampleTransform = {
        ...transformState,
        panX: 0,
        panY: 0,
        scale: 1
      };
      const xValues = [-halfWidth, halfWidth];
      const yValues = [-halfHeight, halfHeight];
      const zValues = getGlyphLayerOffsets(state.glyphDepth);
      const projectedPoints = [];

      zValues.forEach((z) => {
        xValues.forEach((x) => {
          yValues.forEach((y) => {
            projectedPoints.push(projectScenePoint({ x, y, z }, sampleTransform, "wordmark"));
          });
        });
      });

      return projectedPoints.reduce((bounds, point) => ({
        minX: Math.min(bounds.minX, point.x),
        maxX: Math.max(bounds.maxX, point.x),
        minY: Math.min(bounds.minY, point.y),
        maxY: Math.max(bounds.maxY, point.y)
      }), {
        minX: Infinity,
        maxX: -Infinity,
        minY: Infinity,
        maxY: -Infinity
      });
    }

    function getFittedWordmarkTransform(rotation) {
      const gridRect = getGridRect();
      const safetyInset = 6;
      const safeRect = {
        left: gridRect.left + safetyInset,
        right: gridRect.right - safetyInset,
        top: gridRect.top + safetyInset,
        bottom: gridRect.bottom - safetyInset
      };
      const baseTransform = {
        ...sceneTransforms.wordmark,
        ...rotation,
        panX: 0,
        panY: 0,
        scale: 1
      };
      const bounds = getWordmarkProjectedBounds(baseTransform);
      const projectedWidth = Math.max(1, bounds.maxX - bounds.minX);
      const projectedHeight = Math.max(1, bounds.maxY - bounds.minY);
      const targetWidth = Math.max(1, safeRect.right - safeRect.left);
      const targetHeight = Math.max(1, safeRect.bottom - safeRect.top);
      const widthScale = targetWidth / projectedWidth;
      const heightScale = targetHeight / projectedHeight;
      const fittedScale = Math.min(widthScale, heightScale);
      const fittedBounds = getWordmarkProjectedBounds({
        ...baseTransform,
        scale: fittedScale
      });
      const boundsCenterX = (fittedBounds.minX + fittedBounds.maxX) / 2;
      const boundsCenterY = (fittedBounds.minY + fittedBounds.maxY) / 2;
      const targetCenterX = (safeRect.left + safeRect.right) / 2;
      const targetCenterY = (safeRect.top + safeRect.bottom) / 2;

      return {
        x: rotation.x,
        y: rotation.y,
        z: rotation.z,
        panX: targetCenterX - boundsCenterX,
        panY: targetCenterY - boundsCenterY,
        scale: fittedScale
      };
    }

    function animateWordmarkTransformTo(targetTransform) {
      if (wordmarkAutoplayFrame) {
        window.cancelAnimationFrame(wordmarkAutoplayFrame);
      }

      const startRotation = { ...sceneTransforms.wordmark };
      const liveFit = Boolean(targetTransform.liveFit);
      const duration = 460;
      const startTime = performance.now();

      function step(now) {
        const raw = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - raw, 3);
        const currentRotation = {
          x: lerp(startRotation.x, targetTransform.x, eased),
          y: lerp(startRotation.y, targetTransform.y, eased),
          z: lerp(startRotation.z, targetTransform.z, eased)
        };
        sceneTransforms.wordmark.x = currentRotation.x;
        sceneTransforms.wordmark.y = currentRotation.y;
        sceneTransforms.wordmark.z = currentRotation.z;

        if (liveFit) {
          const fittedTransform = getFittedWordmarkTransform(currentRotation);
          sceneTransforms.wordmark.panX = fittedTransform.panX;
          sceneTransforms.wordmark.panY = fittedTransform.panY;
          sceneTransforms.wordmark.scale = fittedTransform.scale;
        } else {
          sceneTransforms.wordmark.panX = lerp(startRotation.panX, targetTransform.panX, eased);
          sceneTransforms.wordmark.panY = lerp(startRotation.panY, targetTransform.panY, eased);
          sceneTransforms.wordmark.scale = lerp(startRotation.scale, targetTransform.scale, eased);
        }
        refreshSceneView("wordmark");
        if (state.mode === "wordmark") {
          updateControlLabels();
        }

        if (raw < 1 && state.wordmarkAutoplay.mode) {
          wordmarkAutoplayFrame = window.requestAnimationFrame(step);
        } else {
          sceneTransforms.wordmark.x = targetTransform.x;
          sceneTransforms.wordmark.y = targetTransform.y;
          sceneTransforms.wordmark.z = targetTransform.z;
          if (liveFit) {
            const fittedTransform = getFittedWordmarkTransform(targetTransform);
            sceneTransforms.wordmark.panX = fittedTransform.panX;
            sceneTransforms.wordmark.panY = fittedTransform.panY;
            sceneTransforms.wordmark.scale = fittedTransform.scale;
          } else {
            sceneTransforms.wordmark.panX = targetTransform.panX;
            sceneTransforms.wordmark.panY = targetTransform.panY;
            sceneTransforms.wordmark.scale = targetTransform.scale;
          }
          refreshSceneView("wordmark");
          if (state.mode === "wordmark") {
            updateControlLabels();
          }
          wordmarkAutoplayFrame = null;
        }
      }

      wordmarkAutoplayFrame = window.requestAnimationFrame(step);
    }

    function scheduleWordmarkAutoplayStep() {
      if (!state.wordmarkAutoplay.mode) {
        return;
      }

      let nextRotation = null;
      if (state.wordmarkAutoplay.mode === "rangeFit") {
        if (state.wordmarkAutoplay.rangeFitReturnRotation) {
          nextRotation = { ...state.wordmarkAutoplay.rangeFitReturnRotation };
          state.wordmarkAutoplay.rangeFitReturnRotation = null;
          state.wordmarkAutoplay.rangeFitCount = 0;
        } else if (state.wordmarkAutoplay.rangeFitCount >= 5) {
          nextRotation = { x: 0, y: 0, z: 0 };
          state.wordmarkAutoplay.rangeFitReturnRotation = state.wordmarkAutoplay.recentRangeFitRotations[0]
            ? { ...state.wordmarkAutoplay.recentRangeFitRotations[0] }
            : { ...sceneTransforms.wordmark, z: 0 };
        } else {
          const references = [
            sceneTransforms.wordmark,
            ...state.wordmarkAutoplay.recentRangeFitRotations
          ].slice(0, 3);
          nextRotation = getRandomWordmarkRangeRotation(references, 28);
          state.wordmarkAutoplay.rangeFitCount += 1;
        }
      }

      const targetTransform = state.wordmarkAutoplay.mode === "rangeFit"
        ? {
            ...getFittedWordmarkTransform(nextRotation),
            liveFit: true
          }
        : {
            ...sceneTransforms.wordmark,
            ...(state.wordmarkAutoplay.mode === "range"
              ? getRandomWordmarkRangeRotation()
              : getRandomWordmarkRotation())
          };
      if (state.wordmarkAutoplay.mode === "rangeFit" && nextRotation) {
        if (!(nextRotation.x === 0 && nextRotation.y === 0 && nextRotation.z === 0)) {
          state.wordmarkAutoplay.recentRangeFitRotations = [
            nextRotation,
            ...state.wordmarkAutoplay.recentRangeFitRotations
          ].slice(0, 2);
        }
      }
      animateWordmarkTransformTo(targetTransform);
      wordmarkAutoplayTimer = window.setTimeout(scheduleWordmarkAutoplayStep, 1000);
    }

    function setWordmarkAutoplay(mode) {
      state.wordmarkAutoplay.mode = mode;
      if (mode !== "rangeFit") {
        state.wordmarkAutoplay.recentRangeFitRotations = [];
        state.wordmarkAutoplay.rangeFitCount = 0;
        state.wordmarkAutoplay.rangeFitReturnRotation = null;
      }

      if (wordmarkAutoplayTimer) {
        window.clearTimeout(wordmarkAutoplayTimer);
        wordmarkAutoplayTimer = null;
      }

      if (wordmarkAutoplayFrame) {
        window.cancelAnimationFrame(wordmarkAutoplayFrame);
        wordmarkAutoplayFrame = null;
      }

      if (mode) {
        if (mode === "rangeFit") {
          state.wordmarkAutoplay.recentRangeFitRotations = [];
          state.wordmarkAutoplay.rangeFitCount = 0;
          state.wordmarkAutoplay.rangeFitReturnRotation = null;
        }
        scheduleWordmarkAutoplayStep();
      }

      updateControlLabels();
    }

    function animateSymbolRotationTo(targetRotation) {
      if (symbolAutoplayFrame) {
        window.cancelAnimationFrame(symbolAutoplayFrame);
      }

      const startRotation = { ...sceneTransforms.symbol };
      const duration = 460;
      const startTime = performance.now();

      function step(now) {
        const raw = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - raw, 3);
        sceneTransforms.symbol.x = lerp(startRotation.x, targetRotation.x, eased);
        sceneTransforms.symbol.y = lerp(startRotation.y, targetRotation.y, eased);
        sceneTransforms.symbol.z = lerp(startRotation.z, targetRotation.z, eased);
        refreshSceneView("symbol");
        if (state.mode === "symbol") {
          updateControlLabels();
        }

        if (raw < 1 && state.symbolAutoplay.isPlaying) {
          symbolAutoplayFrame = window.requestAnimationFrame(step);
        } else {
          sceneTransforms.symbol.x = targetRotation.x;
          sceneTransforms.symbol.y = targetRotation.y;
          sceneTransforms.symbol.z = targetRotation.z;
          refreshSceneView("symbol");
          if (state.mode === "symbol") {
            updateControlLabels();
          }
          symbolAutoplayFrame = null;
        }
      }

      symbolAutoplayFrame = window.requestAnimationFrame(step);
    }

    function scheduleSymbolAutoplayStep() {

      symbolAutoplayTimer = window.setTimeout(scheduleSymbolAutoplayStep, 1000);

    function handleFrameResizeMove(event) {
      if (!frameResizeState) {
        return;
      }

      const dx = event.clientX - frameResizeState.startX;
      const dy = event.clientY - frameResizeState.startY;
      const horizontalSign = frameResizeState.dir.includes("e") ? 1 : -1;
      const verticalSign = frameResizeState.dir.includes("s") ? 1 : -1;

      state.frame.width = Math.round(clampNumber(
        frameResizeState.startWidth + horizontalSign * dx * 2,
        200,
        1600,
        frameResizeState.startWidth
      ));
      state.frame.height = Math.round(clampNumber(
        frameResizeState.startHeight + verticalSign * dy * 2,
        200,
        2000,
        frameResizeState.startHeight
      ));

      refreshExtendedLiveFitOrRender();
      event.preventDefault();
    }

    function stopFrameResize() {
      if (!frameResizeState) {
        return;
      }

      if (frameResizeState.handle.hasPointerCapture(frameResizeState.pointerId)) {
        frameResizeState.handle.releasePointerCapture(frameResizeState.pointerId);
      }
      frameResizeState.handle.classList.remove("is-active");
      window.removeEventListener("pointermove", handleFrameResizeMove);
      window.removeEventListener("pointerup", stopFrameResize);
      window.removeEventListener("pointercancel", stopFrameResize);
      frameResizeState = null;
    }

    function attachFrameResize(handle) {

        if (event.button !== 0) {

        frameResizeState = {
          dir: handle.dataset.dir,

          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          startWidth: state.frame.width,
          startHeight: state.frame.height
        };

        handle.classList.add("is-active");
        handle.setPointerCapture(event.pointerId);
        window.addEventListener("pointermove", handleFrameResizeMove);
        window.addEventListener("pointerup", stopFrameResize);
        window.addEventListener("pointercancel", stopFrameResize);
        event.preventDefault();
      });
    }

        commitExtendedAxisInput(textInput, key);
      });
      textInput.addEventListener("blur", () => {
        commitExtendedAxisInput(textInput, key);
      });
    });

    modeInputMap.symbol.forEach(([textId, key]) => {
      const textInput = document.getElementById(textId);
      textInput.addEventListener("input", (event) => {
        state.symbolAxes[key] = Math.round(clampNumber(Number(event.target.value), 0, 800, state.symbolAxes[key]));
        renderAllScenes();
      });
      textInput.addEventListener("change", () => {
        commitSymbolAxisInput(textInput, key);
      });
      textInput.addEventListener("blur", () => {
        commitSymbolAxisInput(textInput, key);
      });
    });

    extendedPointMinTextInput.addEventListener("change", () => {
      commitExtendedProjectedPointInput(extendedPointMinTextInput, "extendedProjectedPointMin", 1, 200);
    });

    extendedPointMinTextInput.addEventListener("blur", () => {
      commitExtendedProjectedPointInput(extendedPointMinTextInput, "extendedProjectedPointMin", 1, 200);
    });

    extendedPointMaxTextInput.addEventListener("change", () => {
      commitExtendedProjectedPointInput(extendedPointMaxTextInput, "extendedProjectedPointMax", 1, 240);
    });

    extendedPointMaxTextInput.addEventListener("blur", () => {
      commitExtendedProjectedPointInput(extendedPointMaxTextInput, "extendedProjectedPointMax", 1, 240);
    });

    symbolPointMinTextInput.addEventListener("change", () => {
      commitSymbolProjectedPointInput(symbolPointMinTextInput, "symbolProjectedPointMin", 1, 200);
    });

    symbolPointMinTextInput.addEventListener("blur", () => {
      commitSymbolProjectedPointInput(symbolPointMinTextInput, "symbolProjectedPointMin", 1, 200);
    });

    symbolPointMaxTextInput.addEventListener("change", () => {
      commitSymbolProjectedPointInput(symbolPointMaxTextInput, "symbolProjectedPointMax", 1, 240);
    });

    symbolPointMaxTextInput.addEventListener("blur", () => {
      commitSymbolProjectedPointInput(symbolPointMaxTextInput, "symbolProjectedPointMax", 1, 240);
    });

    symbolGapInput.addEventListener("input", (event) => {
      state.symbolGap = Math.round(Number(event.target.value));
      renderAllScenes();
    });

    symbolOSizeInput.addEventListener("input", (event) => {
      state.symbolOSize = Math.round(Number(event.target.value));
      renderAllScenes();
    });

    symbolOSizeTextInput.addEventListener("change", () => {
      commitSymbolOSizeInput(symbolOSizeTextInput);
    });

    symbolOSizeTextInput.addEventListener("blur", () => {
      commitSymbolOSizeInput(symbolOSizeTextInput);
    });

    symbolGapTextInput.addEventListener("change", () => {
      commitSymbolGapInput(symbolGapTextInput);
    });

    symbolGapTextInput.addEventListener("blur", () => {
      commitSymbolGapInput(symbolGapTextInput);
    });

    extendedLabVisibleInput.addEventListener("change", (event) => {
      state.extendedLabVisible = event.target.checked;
      renderAllScenes();
    });

    extendedFitGridButton.addEventListener("click", () => {
      fitExtendedAxesToGrid();
    });

    extendedLiveFitButton.addEventListener("click", () => {
      state.extendedLiveFit = !state.extendedLiveFit;
      if (state.extendedLiveFit && state.mode === "extended" && !activeTransition && !isExtendedAnimating()) {
        state.extendedFitDisplay = true;
        fitExtendedAxesToGrid();
      } else {
        if (!state.extendedLiveFit) {
          state.extendedFitDisplay = false;
          renderAllScenes();
        } else {
          updateControlLabels();
        }
      }
    });

    extendedRandomLayoutButton.addEventListener("click", () => {
      applyExtendedRandomLayout();
    });

    wordmarkPlayToggle.addEventListener("click", () => {
      setWordmarkAutoplay(state.wordmarkAutoplay.mode === "discrete" ? null : "discrete");
    });

    wordmarkPlayToggle2.addEventListener("click", () => {
      setWordmarkAutoplay(state.wordmarkAutoplay.mode === "range" ? null : "range");
    });

    wordmarkPlayToggle3.addEventListener("click", () => {
      setWordmarkAutoplay(state.wordmarkAutoplay.mode === "rangeFit" ? null : "rangeFit");
    });

    symbolPlayToggle.addEventListener("click", () => {
      setSymbolAutoplay(!state.symbolAutoplay.isPlaying);
    });

    frameResizeHandles.forEach(attachFrameResize);
    attachRotation(scenes.wordmark, "wordmark");
    attachRotation(scenes.symbol, "symbol");
    attachRotation(scenes.extended, "extended");

    setMode("wordmark");
    renderAllScenes();
  </script>
</body>
</html>
