<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>o.lab 3D Modes</title>
  <style>
    @font-face {
      font-family: "OPPO Sans";
      src: url("./assets/fonts/OPPO%20Sans%204.0.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --page-bg: #eff2f5;
      --frame-bg: #ffffff;
      --panel-bg: #f7f8fa;
      --panel-card: #ffffff;
      --panel-card-strong: #ffffff;
      --panel-line: rgba(20, 28, 45, 0.09);
      --panel-line-strong: rgba(20, 28, 45, 0.18);
      --panel-soft: rgba(79, 98, 140, 0.06);
      --text: #0f1728;
      --muted: rgba(15, 23, 40, 0.56);
      --accent: #0f1728;
      --accent-soft: rgba(15, 23, 40, 0.08);
      --shape: #000000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--text);
      font-family: "OPPO Sans", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: flex-start;
      gap: 22px;
      padding: 20px;
    }

    .panel {
      width: 332px;
      max-height: calc(100vh - 40px);
      padding: 0;
      border: 1px solid var(--panel-line);
      border-radius: 28px;
      background: var(--panel-bg);
      display: flex;
      position: sticky;
      top: 20px;
      overflow: hidden;
    }

    .panel-scroll {
      flex: 1;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
    }

    .panel-header {
      display: flex;
      align-items: center;
      padding: 8px 6px 6px;
      min-height: 52px;
    }

    .brand-logo {
      width: 102px;
      color: var(--text);
      display: block;
    }

    .brand-logo svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .mode-list {
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--panel-line);
      border-radius: 22px;
      background: var(--panel-card);
    }

    .mode-button {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      padding: 13px 14px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition:
        background-color 160ms ease,
        color 160ms ease,
        border-color 160ms ease,
        transform 160ms ease;
    }

    .mode-button:hover {
      background: var(--panel-soft);
      color: var(--text);
      transform: translateY(-1px);
    }

    .mode-button[aria-pressed="true"] {
      background: var(--accent);
      color: #ffffff;
      border-color: rgba(15, 23, 40, 0.9);
    }

    .control-group {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      background: var(--panel-card);
    }

    .control-section {
      display: none;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      background: var(--panel-card);
    }

    .control-section.is-visible {
      display: grid;
    }

    #view-controls {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: end;
    }

    #global-controls {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: end;
    }

    .section-title {
      margin: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .control {
      display: grid;
      gap: 8px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .control-combo {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 78px;
      gap: 10px;
      align-items: center;
    }

    .axis-pair-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 14px;
      grid-column: 1 / -1;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      grid-column: 1 / -1;
    }

    .control-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .control label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .control-text {
      width: 100%;
      border: 1px solid rgba(20, 28, 45, 0.1);
      background: #f8fafc;
      padding: 11px 12px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      border-radius: 14px;
      transition: border-color 140ms ease, background-color 140ms ease;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .control-text:focus {
      border-color: var(--panel-line-strong);
      background: #ffffff;
    }

    .control-text::-webkit-outer-spin-button,
    .control-text::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .mini-text {
      margin-top: 0;
      padding: 10px 12px;
      font-size: 12px;
    }

    .play-button {
      width: 100%;
      border: 1px solid rgba(20, 28, 45, 0.1);
      background: var(--panel-card-strong);
      color: var(--text);
      padding: 13px 14px;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      border-radius: 18px;
      transition:
        background-color 160ms ease,
        color 160ms ease,
        border-color 160ms ease,
        transform 160ms ease;
    }

    .play-button:hover {
      transform: translateY(-1px);
    }

    .play-button[aria-pressed="true"] {
      background: var(--accent);
      color: #ffffff;
      border-color: rgba(15, 23, 40, 0.92);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      grid-column: 1 / -1;
    }

    .toggle-row + .control,
    .control + .control,
    .control + .toggle-row,
    .toggle-row + .toggle-row,
    .play-button + .play-button,
    .play-button + .control,
    .control + .play-button {
      padding-top: 12px;
      border-top: 1px solid rgba(20, 28, 45, 0.08);
    }

    .toggle-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .toggle-input {
      width: 46px;
      height: 26px;
      appearance: none;
      border-radius: 999px;
      background: rgba(15, 23, 40, 0.12);
      border: 1px solid rgba(15, 23, 40, 0.08);
      position: relative;
      cursor: pointer;
      transition: background-color 140ms ease, border-color 140ms ease;
    }

    .toggle-input::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      transition: transform 140ms ease;
    }

    .toggle-input:checked {
      background: var(--accent);
      border-color: rgba(15, 23, 40, 0.24);
    }

    .toggle-input:checked::after {
      transform: translateX(20px);
    }

    .value {
      font-size: 11px;
      color: rgba(15, 23, 40, 0.84);
      min-width: 42px;
      text-align: right;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: rgba(15, 23, 40, 0.12);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 3px solid #ffffff;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .panel-note {
      display: none;
    }

    .panel-note.is-hidden {
      display: none;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(15, 23, 40, 0.12);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .mode-conditional {
      display: none;
      grid-column: 1 / -1;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(20, 28, 45, 0.08);
    }

    .mode-conditional.is-visible {
      display: grid;
    }

    .axis-control .control-top {
      justify-content: flex-start;
    }

    .axis-control .value {
      display: none;
    }

    .angle-control .control-top {
      justify-content: flex-start;
    }

    #view-controls .control label {
      white-space: nowrap;
    }

    .choice-group {
      display: grid;
      gap: 8px;
      grid-column: 1 / -1;
    }

    .choice-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .choice-button {
      width: 100%;
      border: 1px solid rgba(20, 28, 45, 0.1);
      border-radius: 14px;
      background: #f8fafc;
      color: var(--muted);
      padding: 11px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 140ms ease, background-color 140ms ease, color 140ms ease;
    }

    .choice-button[aria-pressed="true"] {
      background: var(--accent);
      border-color: rgba(15, 23, 40, 0.92);
      color: #ffffff;
    }

    .subsection-title {
      margin: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .handle-cube {
      cursor: pointer;
      pointer-events: auto;
    }

    .handle-cube.is-hovered,
    .handle-cube.is-active-handle {
      --box-color: #16a34a;
    }

    .handle-cube.is-hovered .face,
    .handle-cube.is-active-handle .face,
    .handle-cube.is-hovered .flat-point-face,
    .handle-cube.is-active-handle .flat-point-face,
    .handle-cube.is-hovered.projection-point,
    .handle-cube.is-active-handle.projection-point {
      background: #16a34a !important;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 140ms ease;
      z-index: 6;
    }

    .grid-overlay.is-visible {
      opacity: 1;
    }

    .grid-inner {
      position: absolute;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .grid-line {
      position: absolute;
      background: rgba(0, 0, 0, 0.08);
    }

    .grid-line.is-vertical {
      top: 0;
      bottom: 0;
      width: 1px;
    }

    .grid-line.is-horizontal {
      left: 0;
      right: 0;
      height: 1px;
    }

    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 24px 2px;
    }

    .frame-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      width: 600px;
      height: 800px;
      background: var(--frame-bg);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(15, 23, 40, 0.08);
    }

    .frame-resize-handle {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 9;
      touch-action: none;
    }

    .frame-resize-handle::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-color: rgba(15, 23, 40, 0.35);
      border-style: solid;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .frame-resize-handle[data-dir="nw"] {
      top: -14px;
      left: -14px;
      cursor: nwse-resize;
    }

    .frame-resize-handle[data-dir="nw"]::after {
      border-width: 2px 0 0 2px;
    }

    .frame-resize-handle[data-dir="ne"] {
      top: -14px;
      right: -14px;
      cursor: nesw-resize;
    }

    .frame-resize-handle[data-dir="ne"]::after {
      border-width: 2px 2px 0 0;
    }

    .frame-resize-handle[data-dir="sw"] {
      bottom: -14px;
      left: -14px;
      cursor: nesw-resize;
    }

    .frame-resize-handle[data-dir="sw"]::after {
      border-width: 0 0 2px 2px;
    }

    .frame-resize-handle[data-dir="se"] {
      right: -14px;
      bottom: -14px;
      cursor: nwse-resize;
    }

    .frame-resize-handle[data-dir="se"]::after {
      border-width: 0 2px 2px 0;
    }

    .frame-resize-handle:hover::after,
    .frame-resize-handle.is-active::after {
      opacity: 1;
    }

    .mode-view {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      display: flex;
      opacity: 0;
      pointer-events: none;
    }

    .mode-view.is-active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }

    .endpoint-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
    }

    .projection-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .projection-line {
      position: absolute;
      left: 0;
      top: 0;
      background: var(--box-color, var(--shape));
      transform-origin: 0 50%;
      pointer-events: none;
      border-radius: 999px;
    }

    .projection-point {
      position: absolute;
      background: var(--box-color, var(--shape));
      transform: translate(-50%, -50%);
      pointer-events: auto;
    }

    .endpoint-handle {
      position: absolute;
      width: 36px;
      height: 36px;
      margin-left: -18px;
      margin-top: -18px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      transform: none;
      transition: opacity 120ms ease;
      pointer-events: auto;
      cursor: pointer;
      appearance: none;
    }

    .endpoint-handle::after {
      content: none;
    }

    .endpoint-handle:hover,
    .endpoint-handle.is-active {
      transform: none;
    }

    .endpoint-handle.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .scene-viewport {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      position: relative;
      z-index: 2;
    }

    .scene-rotator {
      position: relative;
      width: 520px;
      height: 520px;
      transform-style: preserve-3d;
      transform-origin: center center;
      cursor: grab;
      touch-action: none;
    }

    .scene-rotator.is-dragging {
      cursor: grabbing;
    }

    .scene-transform {
      position: relative;
      width: 520px;
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
    }

    .scene-perspective {
      position: relative;
      width: 520px;
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    .svg-stack {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      color: var(--shape);
    }

    .svg-layer {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
    }

    .svg-layer svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    .projection-glyph svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }

    .box3d {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
    }

    .flat-point {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      pointer-events: auto;
    }

    .flat-point-face {
      position: absolute;
      left: 50%;
      top: 50%;
      background: var(--box-color, var(--shape));
      transform: translate(-50%, -50%) translateZ(var(--flat-point-lift, 0px));
      transition: background-color 120ms ease;
    }

    .flat-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .flat-bar-face {
      position: absolute;
      left: 50%;
      top: 50%;
      background: var(--box-color, var(--shape));
      transform: translate(-50%, -50%);
    }

    .face {
      position: absolute;
      left: 50%;
      top: 50%;
      background: var(--box-color, var(--shape));
      backface-visibility: visible;
      transition: background-color 120ms ease;
    }

    @media (max-width: 980px) {
      .app {
        flex-direction: column;
        gap: 16px;
        padding: 16px;
      }

      .panel {
        width: 100%;
        max-height: none;
        position: static;
      }

      .panel-scroll {
        padding: 16px;
      }

      .mode-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .control-group {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: end;
      }

      .control-section {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: end;
      }

      .stage {
        padding: 0 4px 20px;
      }
    }

    @media (max-width: 720px) {
      .mode-list,
      .control-group,
      .control-section {
        grid-template-columns: 1fr;
      }

      .axis-pair-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      .choice-list {
        grid-template-columns: 1fr;
      }

      .stage {
        padding: 0 0 16px;
      }

      .frame {
        width: min(600px, 100%);
        height: min(800px, calc(100vh - 360px));
      }

      .scene-rotator {
        width: 460px;
        height: 460px;
      }

      .panel {
        border-radius: 24px;
      }

      .control-group,
      .control-section {
        padding: 14px;
      }
    }
  </style>
</head>

    function createSvgStack(templateId, width, height, depth) {
      const stack = document.createElement("div");
      const html = document.getElementById(templateId).innerHTML.trim();
      const layers = depth <= 0 ? 1 : Math.max(2, Math.min(18, Math.round(depth / 2)));
      const step = layers > 1 ? depth / (layers - 1) : 0;
      const start = -depth / 2;

      stack.className = "svg-stack";
      stack.style.width = width + "px";
      stack.style.height = height + "px";
      stack.style.marginLeft = -width / 2 + "px";
      stack.style.marginTop = -height / 2 + "px";

      for (let i = 0; i < layers; i += 1) {
        const layer = document.createElement("div");
        const z = layers === 1 ? 0 : start + step * i;
        layer.className = "svg-layer";
        layer.style.transform = "translateZ(" + z.toFixed(2) + "px)";
        layer.innerHTML = html;
        stack.appendChild(layer);
      }

      return stack;
    }

    function position3D(el, x, y, z) {

    function createFace(width, height, transform, color = "#000000") {
      const face = document.createElement("div");

      face.style.marginLeft = -width / 2 + "px";

    function createBox(width, height, depth, color = "#000000") {
      const box = document.createElement("div");
      box.className = "box3d";
      box.style.setProperty("--box-color", color);

      box.appendChild(createFace(width, height, "translateZ(" + depth / 2 + "px)", color));
      box.appendChild(createFace(width, height, "rotateY(180deg) translateZ(" + depth / 2 + "px)", color));
      box.appendChild(createFace(depth, height, "translateX(" + width / 2 + "px) rotateY(90deg)", color));
      box.appendChild(createFace(depth, height, "translateX(" + -width / 2 + "px) rotateY(90deg)", color));
      box.appendChild(createFace(width, depth, "translateY(" + -height / 2 + "px) rotateX(90deg)", color));
      box.appendChild(createFace(width, depth, "translateY(" + height / 2 + "px) rotateX(90deg)", color));

      return box;
    }

    function addBox(parent, width, height, depth, x, y, z, color = "#000000") {
      const box = createBox(width, height, depth, color);

    function updateFlatPointElement(point, transformState) {
      const x = Number(point.dataset.x || 0);

      const z = Number(point.dataset.z || 0);
      const lift = Number(point.dataset.lift || 0);
      point.style.transform =

        "translateZ(" + lift + "px) " +
        "rotateZ(" + (-transformState.z) + "deg) " +
        "rotateY(" + (-transformState.y) + "deg) " +
        "rotateX(" + (-transformState.x) + "deg)";
    }

    function getPerspectiveScaleForPoint(point, transformState, mode) {
      const rotated = rotateVectorByTransform(point, transformState);
      const perspectiveDistance = getPerspectiveDistanceValue(mode);
      const perspectiveScale = perspectiveDistance == null
        ? 1
        : perspectiveDistance / Math.max(24, perspectiveDistance - rotated.z);
      return {
        rotated,
        perspectiveScale,
        totalScale: (transformState.scale || 1) * perspectiveScale
      };
    }

    function createFlatPoint(size, color = "#000000", x = 0, y = 0, z = 0, transformState = { x: 0, y: 0, z: 0 }, lift = 0) {
      const depth = Math.max(2, size * 0.18);
      const coverSize = size + Math.max(2, size * 0.12);
      const point = createBox(size, size, depth, color);
      const coverFace = createFace(coverSize, coverSize, "translateZ(" + (depth / 2 + 0.9) + "px)", color);
      point.classList.add("flat-point");
      coverFace.classList.add("flat-point-cover");
      point.style.setProperty("--box-color", color);
      point.appendChild(coverFace);
      point.dataset.x = String(x);
      point.dataset.y = String(y);
      point.dataset.z = String(z);
      point.dataset.lift = String(lift);
      updateFlatPointElement(point, transformState);
      return point;
    }

    function addFlatPoint(parent, size, x, y, z, color = "#000000", transformState = { x: 0, y: 0, z: 0 }, lift = 0) {
      const point = createFlatPoint(size, color, x, y, z, transformState, lift);
      parent.appendChild(point);
      return point;
    }

    function updateFlatBarElement(bar, transformState) {
      const x1 = Number(bar.dataset.x1 || 0);
      const y1 = Number(bar.dataset.y1 || 0);
      const z1 = Number(bar.dataset.z1 || 0);
      const x2 = Number(bar.dataset.x2 || 0);
      const y2 = Number(bar.dataset.y2 || 0);
      const z2 = Number(bar.dataset.z2 || 0);
      const mode = bar.dataset.mode || state.mode;
      const thickness = Number(bar.dataset.thickness || 1);
      const midpoint = {
        x: (x1 + x2) / 2,
        y: (y1 + y2) / 2,
        z: (z1 + z2) / 2
      };
      const p1 = projectScenePoint({ x: x1, y: y1, z: z1 }, transformState, mode);
      const p2 = projectScenePoint({ x: x2, y: y2, z: z2 }, transformState, mode);
      const screenDx = p2.x - p1.x;
      const screenDy = p2.y - p1.y;
      const screenLength = Math.hypot(screenDx, screenDy);
      const angle = Math.atan2(screenDy, screenDx) * 180 / Math.PI;
      const scaleInfo = getPerspectiveScaleForPoint(midpoint, transformState, mode);
      const safeScale = Math.max(0.0001, scaleInfo.totalScale);
      const face = bar.firstElementChild;

      face.style.width = screenLength / safeScale + "px";
      face.style.height = thickness / safeScale + "px";
      bar.style.transform =
        "translate3d(" + midpoint.x + "px," + midpoint.y + "px," + midpoint.z + "px) " +
        "rotateZ(" + angle + "deg) " +
        "rotateZ(" + (-transformState.z) + "deg) " +
        "rotateY(" + (-transformState.y) + "deg) " +
        "rotateX(" + (-transformState.x) + "deg)";
    }

    function createFlatBar(x1, y1, z1, x2, y2, z2, thickness, color = "#000000", transformState = { x: 0, y: 0, z: 0 }, mode = state.mode) {
      const bar = document.createElement("div");
      const face = document.createElement("div");
      bar.className = "flat-bar";
      bar.style.setProperty("--box-color", color);
      bar.dataset.x1 = String(x1);

      bar.dataset.z1 = String(z1);
      bar.dataset.x2 = String(x2);
      bar.dataset.y2 = String(y2);
      bar.dataset.z2 = String(z2);
      bar.dataset.thickness = String(thickness);
      bar.dataset.mode = mode;
      face.className = "flat-bar-face";
      bar.appendChild(face);
      updateFlatBarElement(bar, transformState);
      return bar;
    }

    function addFlatBar(parent, x1, y1, z1, x2, y2, z2, thickness, color = "#000000", transformState = { x: 0, y: 0, z: 0 }, mode = state.mode) {
      const bar = createFlatBar(x1, y1, z1, x2, y2, z2, thickness, color, transformState, mode);
      parent.appendChild(bar);

    function addProjectedLine(overlay, fromPoint, toPoint, thickness, color, transformState, mode) {
      const p1 = projectScenePoint(fromPoint, transformState, mode);
      const p2 = projectScenePoint(toPoint, transformState, mode);
      const midpoint = {
        x: (fromPoint.x + toPoint.x) / 2,
        y: (fromPoint.y + toPoint.y) / 2,
        z: (fromPoint.z + toPoint.z) / 2
      };
      const scaleInfo = getPerspectiveScaleForPoint(midpoint, transformState, mode);
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const length = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      const line = document.createElement("div");
      line.className = "projection-line";
      line.style.setProperty("--box-color", color);
      line.style.width = length + "px";
      line.style.height = Math.max(1, thickness * (transformState.scale || 1)) + "px";
      line.style.left = p1.x.toFixed(2) + "px";
      line.style.top = p1.y.toFixed(2) + "px";
      line.style.transform = "translateY(-50%) rotate(" + angle + "deg)";
      line.style.zIndex = String(Math.round(scaleInfo.rotated.z * 10));
      overlay.appendChild(line);
      return line;
    }

    function addScreenLine(overlay, fromPoint, toPoint, thickness, color, zIndex = 0) {
      const dx = toPoint.x - fromPoint.x;
      const dy = toPoint.y - fromPoint.y;
      const length = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;
      const line = document.createElement("div");
      line.className = "projection-line";
      line.style.setProperty("--box-color", color);
      line.style.width = length + "px";
      line.style.height = Math.max(1, thickness) + "px";
      line.style.left = fromPoint.x.toFixed(2) + "px";
      line.style.top = fromPoint.y.toFixed(2) + "px";
      line.style.transform = "translateY(-50%) rotate(" + angle + "deg)";
      line.style.zIndex = String(zIndex);
      overlay.appendChild(line);
      return line;
    }

    function addProjectedPoint(overlay, size, point, color, transformState, mode, zIndexOverride = null, minScreenSize = 1, maxScreenSize = Infinity) {
      const projected = projectScenePoint(point, transformState, mode);
      const scaledSize = getProjectedPointDisplaySize(size, point, transformState, mode, minScreenSize, maxScreenSize);
      const scaleInfo = getPerspectiveScaleForPoint(point, transformState, mode);
      const marker = document.createElement("div");
      marker.className = "projection-point";
      marker.style.setProperty("--box-color", color);
      marker.style.width = scaledSize + "px";
      marker.style.height = scaledSize + "px";
      marker.style.left = projected.x.toFixed(2) + "px";
      marker.style.top = projected.y.toFixed(2) + "px";
      marker.style.zIndex = String(zIndexOverride == null ? Math.round(scaleInfo.rotated.z * 10) + 1 : zIndexOverride);
      overlay.appendChild(marker);
      return marker;
    }

    function addScreenPoint(overlay, size, center, color, zIndexOverride = null) {
      const marker = document.createElement("div");
      marker.className = "projection-point";
      marker.style.setProperty("--box-color", color);
      marker.style.width = size + "px";
      marker.style.height = size + "px";
      marker.style.left = center.x.toFixed(2) + "px";
      marker.style.top = center.y.toFixed(2) + "px";
      marker.style.zIndex = String(zIndexOverride == null ? 1 : zIndexOverride);
      overlay.appendChild(marker);
      return marker;
    }

    function buildProjectionSvgDocument(markup, opacity = 1, defs = "") {
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + state.frame.width + ' ' + state.frame.height +
        '" width="100%" height="100%" style="display:block;overflow:visible;shape-rendering:geometricPrecision;text-rendering:geometricPrecision">' +
        defs +
        '<g opacity="' + opacity + '">' + markup + '</g></svg>';
    }

    function getWordmarkPerspectivePatchOptions() {
      return {
        cols: 64,
        rows: 18,
        clipOverlap: 0.6
      };
    }

    function getProjectedPlaneScreenCenter(center, basisReference, basisX, basisY) {
      return {
        x: basisReference.x + basisX.x * center.x + basisY.x * center.y,
        y: basisReference.y + basisX.y * center.x + basisY.y * center.y
      };
    }

    function buildRectMarkupWithBasis(size, screenCenter, basisX, basisY, color = "#000000") {
      const half = size / 2;
      const corners = [
        {
          x: screenCenter.x - basisX.x * half - basisY.x * half,
          y: screenCenter.y - basisX.y * half - basisY.y * half
        },
        {
          x: screenCenter.x + basisX.x * half - basisY.x * half,
          y: screenCenter.y + basisX.y * half - basisY.y * half
        },
        {
          x: screenCenter.x + basisX.x * half + basisY.x * half,
          y: screenCenter.y + basisX.y * half + basisY.y * half
        },
        {
          x: screenCenter.x - basisX.x * half + basisY.x * half,
          y: screenCenter.y - basisX.y * half + basisY.y * half
        }
      ];

      return "<polygon points=\"" + corners
        .map((point) => roundSvg(point.x) + "," + roundSvg(point.y))
        .join(" ") + "\" fill=\"" + color + "\" />";
    }

    function addProjectedGlyph(overlay, templateId, width, height, center, transformState, mode, options = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = "projection-glyph";
      wrapper.style.position = "absolute";
      wrapper.style.inset = "0";
      wrapper.style.pointerEvents = "none";
      wrapper.style.zIndex = String(options.zIndex == null
        ? getProjectedDepthOrder(center, transformState, mode) + 1
        : options.zIndex);
      const opacity = options.opacity == null ? 1 : options.opacity;
      wrapper.innerHTML = buildProjectionSvgDocument(
        buildExportGlyph(templateId, width, height, center, transformState, mode),
        opacity
      );
      overlay.appendChild(wrapper);
      return wrapper;
    }

    function addProjectedPerspectiveGlyph(overlay, templateId, width, height, center, transformState, mode, options = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = "projection-glyph";
      wrapper.style.position = "absolute";
      wrapper.style.inset = "0";
      wrapper.style.pointerEvents = "none";
      wrapper.style.zIndex = String(options.zIndex == null
        ? getProjectedDepthOrder(center, transformState, mode) + 1
        : options.zIndex);
      const projectedGlyph = buildExportPerspectiveGlyph(
        templateId,
        width,
        height,
        center,
        transformState,
        mode,
        {
          clipPrefix: "screen-" + mode + "-" + Math.random().toString(36).slice(2),
          ...(options.perspectiveOptions || {})
        }
      );
      wrapper.innerHTML = buildProjectionSvgDocument(
        projectedGlyph.content,
        options.opacity == null ? 1 : options.opacity,
        projectedGlyph.defs ? "<defs>" + projectedGlyph.defs + "</defs>" : ""
      );
      overlay.appendChild(wrapper);
      return wrapper;
    }

    function addProjectedPerspectiveGlyphAtScreenCenter(overlay, templateId, width, height, referenceCenter, screenCenter, transformState, mode, options = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = "projection-glyph";
      wrapper.style.position = "absolute";
      wrapper.style.inset = "0";
      wrapper.style.pointerEvents = "none";
      wrapper.style.zIndex = String(options.zIndex == null
        ? getProjectedDepthOrder(referenceCenter, transformState, mode) + 1
        : options.zIndex);
      const referenceProjected = projectScenePoint(referenceCenter, transformState, mode);
      const deltaX = screenCenter.x - referenceProjected.x;
      const deltaY = screenCenter.y - referenceProjected.y;
      const projectedGlyph = buildExportPerspectiveGlyph(
        templateId,
        width,
        height,
        referenceCenter,
        transformState,
        mode,
        {
          clipPrefix: "screen-shifted-" + mode + "-" + Math.random().toString(36).slice(2),
          ...(options.perspectiveOptions || {})
        }
      );
      wrapper.innerHTML = buildProjectionSvgDocument(
        "<g transform=\"translate(" + roundSvg(deltaX, 4) + " " + roundSvg(deltaY, 4) + ")\">" + projectedGlyph.content + "</g>",
        options.opacity == null ? 1 : options.opacity,
        projectedGlyph.defs ? "<defs>" + projectedGlyph.defs + "</defs>" : ""
      );
      overlay.appendChild(wrapper);
      return wrapper;
    }

    function addProjectedGlyphAtScreenCenter(overlay, templateId, width, height, screenCenter, basisX, basisY, options = {}) {
      const wrapper = document.createElement("div");
      wrapper.className = "projection-glyph";
      wrapper.style.position = "absolute";
      wrapper.style.inset = "0";
      wrapper.style.pointerEvents = "none";
      wrapper.style.zIndex = String(options.zIndex == null ? 1 : options.zIndex);
      const opacity = options.opacity == null ? 1 : options.opacity;
      wrapper.innerHTML = buildProjectionSvgDocument(
        buildGlyphMarkupWithProjectedBasis(templateId, width, height, screenCenter, basisX, basisY),
        opacity
      );
      overlay.appendChild(wrapper);
      return wrapper;
    }

    function addProjectedPlanePoint(overlay, size, center, color, transformState, mode, zIndexOverride = null) {
      const half = size / 2;
      const corners = [
        { x: center.x - half, y: center.y - half, z: center.z || 0 },
        { x: center.x + half, y: center.y - half, z: center.z || 0 },
        { x: center.x + half, y: center.y + half, z: center.z || 0 },
        { x: center.x - half, y: center.y + half, z: center.z || 0 }
      ].map((point) => projectScenePoint(point, transformState, mode));
      const wrapper = document.createElement("div");
      wrapper.className = "projection-glyph";
      wrapper.style.position = "absolute";
      wrapper.style.inset = "0";
      wrapper.style.pointerEvents = "none";
      wrapper.style.zIndex = String(zIndexOverride == null
        ? getProjectedDepthOrder(center, transformState, mode) + 2
        : zIndexOverride);
      wrapper.innerHTML = buildProjectionSvgDocument(
        "<polygon points=\"" + corners
          .map((point) => roundSvg(point.x) + "," + roundSvg(point.y))
          .join(" ") + "\" fill=\"" + color + "\" />",
        1
      );
      overlay.appendChild(wrapper);
      return wrapper;
    }

    function getProjectedPointDisplaySize(size, point, transformState, mode, minScreenSize = 1, maxScreenSize = Infinity) {
      const scaleInfo = getPerspectiveScaleForPoint(point, transformState, mode);
      const clampedMax = Math.max(minScreenSize, maxScreenSize);
      return Math.min(clampedMax, Math.max(minScreenSize, size * scaleInfo.totalScale));
    }

    function getProjectedDepthOrder(point, transformState, mode) {
      return Math.round(getPerspectiveScaleForPoint(point, transformState, mode).rotated.z * 10);
    }

    function getProjectedRectBounds(width, height, center, transformState, mode) {
      const halfWidth = width / 2;
      const halfHeight = height / 2;
      const points = [
        { x: center.x - halfWidth, y: center.y - halfHeight, z: center.z || 0 },
        { x: center.x + halfWidth, y: center.y - halfHeight, z: center.z || 0 },
        { x: center.x - halfWidth, y: center.y + halfHeight, z: center.z || 0 },
        { x: center.x + halfWidth, y: center.y + halfHeight, z: center.z || 0 }
      ].map((point) => projectScenePoint(point, transformState, mode));

      return {
        minX: Math.min(...points.map((point) => point.x)),
        maxX: Math.max(...points.map((point) => point.x)),
        minY: Math.min(...points.map((point) => point.y)),
        maxY: Math.max(...points.map((point) => point.y))
      };
    }

    function getRectBoundsArea(bounds) {
      return Math.max(1, (bounds.maxX - bounds.minX) * (bounds.maxY - bounds.minY));
    }

    function getExtendedProjectedOGeometry(unit, origin, axes) {
      const cubeSize = origin.size || getCubeSize("extended");
      const oWidth = 145.593 * unit;
      const oHeight = 145.593 * unit;
      const labWidth = 363.576 * unit;
      const labHeight = 181 * unit;
      const leftGap = 57.153 * unit;
      const rightGap = 70.72 * unit;
      const leftEndpointLeftEdge = origin.x - axes.xNeg - cubeSize / 2;
      const rightEndpointRightEdge = origin.x + axes.xPos + cubeSize / 2;
      const oCenterX = leftEndpointLeftEdge - leftGap - oWidth / 2;
      const labCenterX = rightEndpointRightEdge + rightGap + labWidth / 2;

      return {
        oWidth,
        oHeight,
        labWidth,
        labHeight,
        leftGap,
        rightGap,
        oCenter: { x: oCenterX, y: origin.y, z: 0 },
        labCenter: { x: labCenterX, y: origin.y, z: 0 }
      };
    }

    function getExtendedTargetOArea() {
      const shorterSide = Math.min(state.frame.width, state.frame.height);
      return (shorterSide * shorterSide) / 120;
    }

    function getExtendedFlatGlyphScreenMetrics() {
      const oScreenSize = Math.sqrt(getExtendedTargetOArea());
      const screenUnit = oScreenSize / 145.593;
      return {
        oWidth: 145.593 * screenUnit,
        oHeight: 145.593 * screenUnit,
        labWidth: 363.576 * screenUnit,
        labHeight: 181 * screenUnit,
        leftGap: 57.153 * screenUnit,
        rightGap: 70.72 * screenUnit
      };
    }

    function getExtendedUnitForTargetOArea(origin, axes, transformState) {
      const targetArea = getExtendedTargetOArea();
      let low = 0.02;
      let high = 20;
      let bestUnit = (origin.size || getCubeSize("extended")) / 38.96;
      let bestDiff = Infinity;

      for (let i = 0; i < 28; i += 1) {
        const mid = (low + high) / 2;
        const geometry = getExtendedProjectedOGeometry(mid, origin, axes);
        const area = getRectBoundsArea(getProjectedRectBounds(
          geometry.oWidth,
          geometry.oHeight,
          geometry.oCenter,
          transformState,
          "extended"
        ));
        const diff = Math.abs(area - targetArea);

        if (diff < bestDiff) {
          bestDiff = diff;
          bestUnit = mid;
        }

        if (area < targetArea) {
          low = mid;
        } else {
          high = mid;
        }
      }

      return bestUnit;
    }

    function solveProjectedGlyphCenterX(width, height, centerY, transformState, mode, targetEdge, edge) {
      let low = -4000;
      let high = 4000;
      let best = 0;
      let bestDiff = Infinity;

      for (let i = 0; i < 28; i += 1) {
        const middle = (low + high) / 2;
        const bounds = getProjectedRectBounds(width, height, { x: middle, y: centerY, z: 0 }, transformState, mode);
        const currentEdge = edge === "right" ? bounds.maxX : bounds.minX;
        const diff = currentEdge - targetEdge;

        if (Math.abs(diff) < bestDiff) {
          bestDiff = Math.abs(diff);
          best = middle;
        }

        if (diff < 0) {
          low = middle;
        } else {
          high = middle;
        }
      }

      return best;
    }

    function updateFlatPoints(parent, transformState) {
      parent.querySelectorAll(".flat-point").forEach((point) => {
        updateFlatPointElement(point, transformState);
      });
      parent.querySelectorAll(".flat-bar").forEach((bar) => {
        updateFlatBarElement(bar, transformState);
      });
    }

    function addMarker(parent, size, x, y, z, options = {}) {
      const color = options.color || "#000000";
      if (getPointStyle() === "flat") {
        return addFlatPoint(
          parent,
          size,
          x,
          y,
          z,
          color,
          options.transformState || { x: 0, y: 0, z: 0 },
          options.lift || 0
        );
      }

      return addBox(parent, size, size, size, x, y, z, color);
    }

    function getWordmarkOrigin(cubeSize = getCubeSize("wordmark")) {
      const wordmarkWidth = 430;
      const wordmarkHeight = wordmarkWidth * 45 / 169;
      const dotSvgX = 55.4588;
      const dotSvgY = 26.5798;

      return {
        x: (dotSvgX - 169 / 2) * (wordmarkWidth / 169),
        y: (dotSvgY - 45 / 2) * (wordmarkHeight / 45),
        size: cubeSize
      };
    }

    function getCenteredOrigin(cubeSize = getCubeSize()) {
      return {
        x: 0,
        y: 0,
        size: cubeSize
      };
    }

    function getZeroAxes() {
      return { xNeg: 0, xPos: 0, yNeg: 0, yPos: 0, zNeg: 0, zPos: 0 };
    }

    function getSymbolAxes() {
      return { ...state.symbolAxes };
    }

    function getAxesForMode(mode) {
      if (mode === "symbol") {
        return getSymbolAxes();
      }

      if (mode === "extended") {
        return { ...state.extendedAxes };
      }

      return getZeroAxes();
    }

    function getOriginForMode(mode) {
      if (mode === "wordmark") {
        return getWordmarkOrigin(getCubeSize("wordmark"));
      }

      return getCenteredOrigin(getCubeSize(mode));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function interpolateTransform(fromTransform, toTransform, t) {
      return {
        x: lerp(fromTransform.x, toTransform.x, t),
        y: lerp(fromTransform.y, toTransform.y, t),
        z: lerp(fromTransform.z, toTransform.z, t),
        panX: lerp(fromTransform.panX, toTransform.panX, t),
        panY: lerp(fromTransform.panY, toTransform.panY, t),
        scale: lerp(fromTransform.scale, toTransform.scale, t)
      };
    }

    function interpolateAxes(fromAxes, toAxes, t) {
      return {
        xNeg: lerp(fromAxes.xNeg, toAxes.xNeg, t),
        xPos: lerp(fromAxes.xPos, toAxes.xPos, t),
        yNeg: lerp(fromAxes.yNeg, toAxes.yNeg, t),
        yPos: lerp(fromAxes.yPos, toAxes.yPos, t),
        zNeg: lerp(fromAxes.zNeg, toAxes.zNeg, t),
        zPos: lerp(fromAxes.zPos, toAxes.zPos, t)
      };
    }

    function interpolateOrigin(fromOrigin, toOrigin, t) {
      return {
        x: lerp(fromOrigin.x, toOrigin.x, t),
        y: lerp(fromOrigin.y, toOrigin.y, t),
        size: lerp(fromOrigin.size || getCubeSize(), toOrigin.size || getCubeSize(), t)
      };
    }

    function addAxisSystem(parent, cubeSize, axisThickness, axes, origin, options = {}) {
      const xNeg = axes.xNeg;
      const xPos = axes.xPos;
      const yNeg = axes.yNeg;
      const yPos = axes.yPos;
      const zNeg = axes.zNeg;
      const zPos = axes.zPos;
      const hideZeroNegativeX = options.hideZeroNegativeX === true;
      const axisColor = options.axisColor || "#000000";
      const transformState = options.transformState || { x: 0, y: 0, z: 0 };
      const markerLift = options.markerLift == null
        ? (getPointStyle() === "flat"
          ? 0
          : axisThickness / 2 + 1)
        : options.markerLift;
      const mode = options.mode || state.mode;
      const overlayTarget = options.overlayTarget || null;
      const useProjectedLines = getPointStyle() === "flat" && (mode === "symbol" || mode === "extended") && overlayTarget;

      if (useProjectedLines) {
        if (mode === "extended" && options.useFlatRayProjection) {
          const segmentDepthOrder = {};
          const projections = {};

          const addFlatProjectedSegment = (key, length) => {
            const projection = getExtendedAxisRayProjection(key, length, transformState);
            const endpoint3D = getExtendedEndpointPoint3D(key, length);
            const midpoint3D = {
              x: endpoint3D.x / 2,
              y: endpoint3D.y / 2,
              z: endpoint3D.z / 2
            };
            segmentDepthOrder[key] = getProjectedDepthOrder(midpoint3D, transformState, mode);
            projections[key] = projection;
            addScreenLine(
              overlayTarget,
              projection.origin,
              projection.projected,
              Math.max(1, axisThickness * (transformState.scale || 1)),
              axisColor,
              segmentDepthOrder[key]
            );
          };

          if (!(hideZeroNegativeX && xNeg === 0)) {
            addFlatProjectedSegment("xNeg", xNeg);
          }
          addFlatProjectedSegment("xPos", xPos);
          addFlatProjectedSegment("yNeg", yNeg);
          addFlatProjectedSegment("yPos", yPos);
          addFlatProjectedSegment("zNeg", zNeg);
          addFlatProjectedSegment("zPos", zPos);

          const addFlatEndpointMarker = (pointKey, length) => {
            const marker = addScreenPoint(
              overlayTarget,
              getFlatExtendedProjectedPointSize(pointKey, length, cubeSize, axisThickness, transformState),
              projections[pointKey].projected,
              "#000000",
              (segmentDepthOrder[pointKey] == null ? 1 : segmentDepthOrder[pointKey] + 1)
            );
            return marker;
          };

          let xNegBox = null;
          if (!(hideZeroNegativeX && xNeg === 0)) {
            xNegBox = addFlatEndpointMarker("xNeg", xNeg);
            if (typeof options.onEndpoint === "function") {
              options.onEndpoint("xNeg", xNegBox);
            }
          }
          const xPosBox = addFlatEndpointMarker("xPos", xPos);
          const yNegBox = addFlatEndpointMarker("yNeg", yNeg);
          const yPosBox = addFlatEndpointMarker("yPos", yPos);
          const zNegBox = addFlatEndpointMarker("zNeg", zNeg);
          const zPosBox = addFlatEndpointMarker("zPos", zPos);

          if (typeof options.onEndpoint === "function") {
            options.onEndpoint("xPos", xPosBox);
            options.onEndpoint("yNeg", yNegBox);
            options.onEndpoint("yPos", yPosBox);
            options.onEndpoint("zNeg", zNegBox);
            options.onEndpoint("zPos", zPosBox);
          }

          return;
        }

        const originPoint = { x: origin.x, y: origin.y, z: 0 };
        const segmentDepthOrder = {};

        const addProjectedSegment = (key, toPoint) => {
          const midpoint = {
            x: (originPoint.x + toPoint.x) / 2,
            y: (originPoint.y + toPoint.y) / 2,
            z: (originPoint.z + toPoint.z) / 2
          };
          segmentDepthOrder[key] = getProjectedDepthOrder(midpoint, transformState, mode);
          addProjectedLine(
            overlayTarget,
            originPoint,
            toPoint,
            axisThickness,
            axisColor,
            transformState,
            mode
          );
        };

        if (!(hideZeroNegativeX && xNeg === 0)) {
          addProjectedSegment("xNeg", { x: origin.x - xNeg, y: origin.y, z: 0 });
        }
        addProjectedSegment("xPos", { x: origin.x + xPos, y: origin.y, z: 0 });
        addProjectedSegment("yNeg", { x: origin.x, y: origin.y - yNeg, z: 0 });
        addProjectedSegment("yPos", { x: origin.x, y: origin.y + yPos, z: 0 });
        addProjectedSegment("zNeg", { x: origin.x, y: origin.y, z: -zNeg });
        addProjectedSegment("zPos", { x: origin.x, y: origin.y, z: zPos });

        options.projectedSegmentDepthOrder = segmentDepthOrder;
      } else {
        addBox(parent, xNeg + xPos, axisThickness, axisThickness, origin.x + (xPos - xNeg) / 2, origin.y, 0, axisColor);
        addBox(parent, axisThickness, yNeg + yPos, axisThickness, origin.x, origin.y + (yPos - yNeg) / 2, 0, axisColor);
        addBox(parent, axisThickness, axisThickness, zNeg + zPos, origin.x, origin.y, (zPos - zNeg) / 2, axisColor);
      }

      const addEndpointMarker = (pointKey, x, y, z) => {
        if (useProjectedLines) {
          const lineScreenThickness = Math.max(1, axisThickness * (transformState.scale || 1));
          const baseMinPointSize = mode === "extended"
            ? state.extendedProjectedPointMin
            : mode === "symbol"
              ? state.symbolProjectedPointMin
              : 1;
          const baseMaxPointSize = mode === "extended"
            ? state.extendedProjectedPointMax
            : mode === "symbol"
              ? state.symbolProjectedPointMax
              : Infinity;
          const minPointSize = Math.max(baseMinPointSize, lineScreenThickness);
          const maxPointSize = Number.isFinite(baseMaxPointSize)
            ? Math.max(minPointSize, baseMaxPointSize)
            : Infinity;
          return addProjectedPoint(
            overlayTarget,
            cubeSize,
            { x, y, z },
            "#000000",
            transformState,
            mode,
            (options.projectedSegmentDepthOrder && options.projectedSegmentDepthOrder[pointKey] != null)
              ? options.projectedSegmentDepthOrder[pointKey] + 1
              : null,
            minPointSize,
            maxPointSize
          );
        }

        return addMarker(parent, cubeSize, x, y, z, { transformState, lift: markerLift, overlayTarget, mode });
      };

      let xNegBox = null;
      if (!(hideZeroNegativeX && xNeg === 0)) {
        xNegBox = addEndpointMarker("xNeg", origin.x - xNeg, origin.y, 0);
        if (typeof options.onEndpoint === "function") {
          options.onEndpoint("xNeg", xNegBox);
        }
      }
      const xPosBox = addEndpointMarker("xPos", origin.x + xPos, origin.y, 0);
      const yNegBox = addEndpointMarker("yNeg", origin.x, origin.y - yNeg, 0);
      const yPosBox = addEndpointMarker("yPos", origin.x, origin.y + yPos, 0);
      const zNegBox = addEndpointMarker("zNeg", origin.x, origin.y, -zNeg);
      const zPosBox = addEndpointMarker("zPos", origin.x, origin.y, zPos);

      if (typeof options.onEndpoint === "function") {
        options.onEndpoint("xPos", xPosBox);
        options.onEndpoint("yNeg", yNegBox);
        options.onEndpoint("yPos", yPosBox);
        options.onEndpoint("zNeg", zNegBox);
        options.onEndpoint("zPos", zPosBox);
      }
    }

    function buildWordmarkScene(scene, options = {}) {
      const wordmarkWidth = 430;
      const wordmarkHeight = wordmarkWidth * 45 / 169;
      const cubeSize = options.cubeSize || getCubeSize("wordmark");
      const axisThickness = options.axisThickness || getAxisThickness(cubeSize, getAxisRatio("wordmark"));
      const origin = options.origin || getWordmarkOrigin(cubeSize);
      const useFlatWordmarkScene = getPointStyle() === "flat";

      const wordmark = createSvgStack("tpl-wordmark", wordmarkWidth, wordmarkHeight, state.glyphDepth);
      position3D(wordmark, 0, 0, 0);
      scene.appendChild(wordmark);

      if (options.transitionAxes) {
        addAxisSystem(scene, cubeSize, axisThickness, options.transitionAxes, origin, {
          transformState: options.transformState,
          mode: "wordmark",
          overlayTarget: options.overlayTarget
        });
      }

      if (useFlatWordmarkScene) {
        addPlanarMarker(scene, origin.size, origin.x, origin.y, 0, "#000000");
        return;
      }

      addBox(scene, origin.size, origin.size, origin.size, origin.x, origin.y, 0, "#000000");
    }

    function buildSymbolScene(scene, options = {}) {
      const cubeSize = options.cubeSize || getCubeSize("symbol");
      const axisThickness = options.axisThickness || getAxisThickness(cubeSize, getAxisRatio("symbol"));
      const axes = options.axes || getSymbolAxes();
      const origin = options.origin || getCenteredOrigin(cubeSize);

      addAxisSystem(scene, cubeSize, axisThickness, axes, origin, {
        transformState: options.transformState,
        mode: "symbol",
        overlayTarget: options.overlayTarget
      });

      const unit = state.symbolOSize / 38.96;
      const oWidth = 145.593 * unit;
      const oHeight = 145.593 * unit;
      const leftGap = state.symbolGap;

      const leftEndpointLeftEdge = origin.x - axes.xNeg - cubeSize / 2;

      const oCenterX = leftEndpointLeftEdge - leftGap - oWidth / 2;
      if (getPointStyle() === "flat" && options.transformState && options.overlayTarget) {
        addProjectedGlyph(
          options.overlayTarget,
          "tpl-o",
          oWidth,
          oHeight,
          { x: oCenterX, y: origin.y, z: 0 },
          options.transformState,
          "symbol"
        );
        return;
      }

      const oStack = createSvgStack("tpl-o", oWidth, oHeight, state.glyphDepth);
      position3D(oStack, oCenterX, origin.y, 0);
      scene.appendChild(oStack);
    }

    function buildExtendedScene(scene, options = {}) {
      const cubeSize = options.cubeSize || getCubeSize("extended");
      const axisThickness = options.axisThickness || getAxisThickness(cubeSize, getAxisRatio("extended"));
      const axes = options.axes || state.extendedAxes;
      const origin = options.origin || getCenteredOrigin(cubeSize);
      const useProjectedGlyphs = getPointStyle() === "flat" && options.transformState && options.overlayTarget;

      addAxisSystem(scene, cubeSize, axisThickness, axes, origin, {
        axisColor: "#BEBEBE",
        onEndpoint: options.enableHandles ? attachExtendedHandle : null,
        transformState: options.transformState,
        mode: "extended",
        overlayTarget: options.overlayTarget,
        useFlatRayProjection: shouldUseFlatExtendedRayDisplay()
      });

      const fallbackUnit = (origin.size || cubeSize) / 38.96;
      const unit = options.transformState
        ? getExtendedUnitForTargetOArea(origin, axes, options.transformState)
        : fallbackUnit;
      const geometry = getExtendedProjectedOGeometry(unit, origin, axes);
      const oWidth = geometry.oWidth;
      const oHeight = geometry.oHeight;
      const labWidth = geometry.labWidth;
      const labHeight = geometry.labHeight;
      const oCenter = geometry.oCenter;
      const labCenter = geometry.labCenter;

      if (useProjectedGlyphs) {
        if (shouldUseFlatExtendedRayDisplay()) {
          const oPlacement = getFlatExtendedGlyphPlacement("o", axes, cubeSize, axisThickness, options.transformState, "ray");
          addProjectedPerspectiveGlyphAtScreenCenter(
            options.overlayTarget,
            "tpl-o",
            oPlacement.width,
            oPlacement.height,
            oPlacement.center,
            oPlacement.screenCenter,
            options.transformState,
            "extended",
            { zIndex: getProjectedDepthOrder(oPlacement.center, options.transformState, "extended") + 1 }
          );
          if (options.labVisible !== false) {
            const labPlacement = getFlatExtendedGlyphPlacement("lab", axes, cubeSize, axisThickness, options.transformState, "ray");
            addProjectedPerspectiveGlyphAtScreenCenter(
              options.overlayTarget,
              "tpl-lab",
              labPlacement.width,
              labPlacement.height,
              labPlacement.center,
              labPlacement.screenCenter,
              options.transformState,
              "extended",
              {
                zIndex: getProjectedDepthOrder(labPlacement.center, options.transformState, "extended") + 1,
                opacity: options.labOpacity == null ? 1 : options.labOpacity
              }
            );
          }
        } else {
          addProjectedPerspectiveGlyph(
            options.overlayTarget,
            "tpl-o",
            oWidth,
            oHeight,
            oCenter,
            options.transformState,
            "extended",
            { zIndex: getProjectedDepthOrder(oCenter, options.transformState, "extended") + 1 }
          );
          if (options.labVisible !== false) {
            addProjectedPerspectiveGlyph(
              options.overlayTarget,
              "tpl-lab",
              labWidth,
              labHeight,
              labCenter,
              options.transformState,
              "extended",
              {
                zIndex: getProjectedDepthOrder(labCenter, options.transformState, "extended") + 1,
                opacity: options.labOpacity == null ? 1 : options.labOpacity
              }
            );
          }
        }
        return;
      }

      const oStack = createSvgStack("tpl-o", oWidth, oHeight, state.glyphDepth);
      const labStack = createSvgStack("tpl-lab", labWidth, labHeight, state.glyphDepth);

      position3D(oStack, oCenter.x, oCenter.y, oCenter.z || 0);
      position3D(labStack, labCenter.x, labCenter.y, labCenter.z || 0);

      scene.appendChild(oStack);
      if (options.labVisible !== false) {
        labStack.style.opacity = options.labOpacity == null ? "1" : String(options.labOpacity);
        scene.appendChild(labStack);
      }
    }

    function clearScene(scene) {
      scene.innerHTML = "";
    }

    function updateGridOverlay() {
      const padding = Math.sqrt(state.frame.width * state.frame.width + state.frame.height * state.frame.height) / 50;
      gridInner.style.left = padding + "px";
      gridInner.style.top = padding + "px";
      gridInner.style.right = padding + "px";
      gridInner.style.bottom = padding + "px";
      gridOverlay.classList.toggle("is-visible", state.showGrid);
    }

    function getGridPadding() {
      return Math.sqrt(state.frame.width * state.frame.width + state.frame.height * state.frame.height) / 50;
    }

    function getGridRect() {
      const padding = getGridPadding();
      return {
        left: padding,
        top: padding,
        right: state.frame.width - padding,
        bottom: state.frame.height - padding
      };
    }

    function applySceneTransform(sceneParts, transformState) {
      sceneParts.transform.style.transform =
        "translate(" + transformState.panX + "px, " + transformState.panY + "px) " +
        "scale(" + transformState.scale + ")";
      sceneParts.rotator.style.transform =
        "rotateX(" + transformState.x + "deg) rotateY(" + transformState.y + "deg) rotateZ(" + transformState.z + "deg)";
      updateFlatPoints(sceneParts.rotator, transformState);
    }

    function refreshSceneView(mode) {
      if ((mode === "wordmark" || mode === "symbol" || mode === "extended") && getPointStyle() === "flat" && !activeTransition) {
        renderScene(mode);
        if (mode === "extended") {
          updateExtendedEndpointOverlay();
          syncEndpointCubeClasses();
        }
        return;
      }

      applySceneTransform(scenes[mode], sceneTransforms[mode]);

      if (mode === "extended") {
        updateExtendedEndpointOverlay();
        syncEndpointCubeClasses();
      }
    }

    function renderScene(mode) {
      const sceneParts = scenes[mode];
      const scene = sceneParts.rotator;
      const overlay = sceneParts.overlay;
      if (mode === "extended") {
        Object.keys(endpointCubeMap).forEach((key) => {
          endpointCubeMap[key] = null;
        });
      }
      clearScene(scene);
      overlay.innerHTML = "";
      let transformState = sceneTransforms[mode];
      let perspectiveValue = state.perspectiveDistortion[mode];
      let cubeSize = getCubeSize(mode);
      let axisThickness = getAxisThickness(cubeSize, getAxisRatio(mode));

      if (activeTransition && activeTransition.to === mode) {
        const fromAxes = getAxesForMode(activeTransition.from);
        const toAxes = getAxesForMode(activeTransition.to);
        const axes = interpolateAxes(fromAxes, toAxes, activeTransition.progress);
        const fromOrigin = getOriginForMode(activeTransition.from);
        const toOrigin = getOriginForMode(activeTransition.to);
        const origin = interpolateOrigin(fromOrigin, toOrigin, activeTransition.progress);
        transformState = interpolateTransform(sceneTransforms[activeTransition.from], sceneTransforms[activeTransition.to], activeTransition.progress);
        perspectiveValue = lerp(
          state.perspectiveDistortion[activeTransition.from],
          state.perspectiveDistortion[activeTransition.to],
          activeTransition.progress
        );
        cubeSize = lerp(getCubeSize(activeTransition.from), getCubeSize(activeTransition.to), activeTransition.progress);
        axisThickness = getAxisThickness(
          cubeSize,
          lerp(getAxisRatio(activeTransition.from), getAxisRatio(activeTransition.to), activeTransition.progress)
        );

        if (mode === "wordmark") {
          buildWordmarkScene(scene, { transitionAxes: axes, origin, cubeSize, axisThickness, transformState, overlayTarget: overlay });
        } else if (mode === "symbol") {
          buildSymbolScene(scene, { axes, origin, cubeSize, axisThickness, transformState, overlayTarget: overlay });
        } else if (mode === "extended") {
          const labOpacity = activeTransition.from === "wordmark" || activeTransition.from === "symbol"
            ? activeTransition.progress
            : 1;
          buildExtendedScene(scene, {
            axes,
            labOpacity,
            origin,
            cubeSize,
            axisThickness,
            labVisible: state.extendedLabVisible,
            transformState,
            overlayTarget: overlay
          });
        }
      } else if (mode === "wordmark") {
        buildWordmarkScene(scene, { cubeSize, axisThickness, transformState, overlayTarget: overlay });
      } else if (mode === "symbol") {
        buildSymbolScene(scene, { cubeSize, axisThickness, transformState, overlayTarget: overlay });
      } else if (mode === "extended") {
        buildExtendedScene(scene, {
          cubeSize,
          axisThickness,
          labVisible: state.extendedLabVisible,
          enableHandles: state.mode === "extended",
          transformState,
          overlayTarget: overlay
        });
      }

      sceneParts.perspective.style.perspective = getPerspectiveSetting(perspectiveValue);
      applySceneTransform(sceneParts, transformState);
    }

    function renderAllScenes() {
      if (!isExtendedAnimating() && state.extendedGridSnap && Number.isInteger(state.extendedGridSnapTarget)) {
        const targets = getGridSnapTargets();
        const target = targets[state.extendedGridSnapTarget];
        if (target) {
          sceneTransforms.extended.panX = target.panX;
          sceneTransforms.extended.panY = target.panY;
        }
      }

      frameElement.style.width = state.frame.width + "px";
      frameElement.style.height = state.frame.height + "px";
      updateGridOverlay();

      renderScene("wordmark");
      renderScene("symbol");
      renderScene("extended");
      updateExtendedEndpointOverlay();
      syncEndpointCubeClasses();
      updateControlLabels();
    }

    function startModeTransition(fromMode, toMode) {
      if (transitionFrame) {
        window.cancelAnimationFrame(transitionFrame);
      }

      const start = performance.now();
      activeTransition = {
        from: fromMode,
        to: toMode,
        progress: 0
      };
      renderScene(toMode);

      function step(now) {
        const raw = Math.min(1, (now - start) / 460);
        activeTransition.progress = 1 - Math.pow(1 - raw, 3);
        renderScene(toMode);

        if (raw < 1) {
          transitionFrame = window.requestAnimationFrame(step);
        } else {
          activeTransition = null;
          transitionFrame = null;
          renderScene(toMode);
        }
      }

      transitionFrame = window.requestAnimationFrame(step);
    }

    function attachRotation(sceneParts, key) {
      const interactionSurface = sceneParts.transform;
      let pointerId = null;
      let startX = 0;
      let startY = 0;
      let dragMode = null;
      let startTransform = null;

      interactionSurface.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });

      interactionSurface.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".handle-cube")) {
          return;
        }

        if (key === "extended" && isExtendedAnimating()) {
          return;
        }

        if (event.button !== 0 && event.button !== 2) {
          return;
        }

        pointerId = event.pointerId;
        startX = event.clientX;
        startY = event.clientY;
        dragMode = event.button === 2 ? "pan" : "rotate";
        startTransform = { ...sceneTransforms[key] };
        sceneParts.rotator.classList.add("is-dragging");
        interactionSurface.setPointerCapture(pointerId);
        event.preventDefault();
      });

      interactionSurface.addEventListener("pointermove", (event) => {
        if (event.pointerId !== pointerId) {
          return;
        }

        const dx = event.clientX - startX;
        const dy = event.clientY - startY;
        const transformState = sceneTransforms[key];

        if (dragMode === "pan") {
          if (key === "extended" && !state.extendedLiveFit) {
            state.extendedFitDisplay = false;
          }
          const rawPanX = startTransform.panX + dx;
          const rawPanY = startTransform.panY + dy;

          if (key === "extended" && state.extendedGridSnap) {
            const snapped = snapExtendedPanToGrid(rawPanX, rawPanY);
            transformState.panX = snapped.panX;
            transformState.panY = snapped.panY;
          } else {
            transformState.panX = rawPanX;
            transformState.panY = rawPanY;
            if (key === "extended") {
              state.extendedGridSnapTarget = null;
            }
          }
        } else {
          if (key === "extended" && !state.extendedLiveFit) {
            state.extendedFitDisplay = false;
          }
          transformState.y = startTransform.y + dx * 0.45;
          transformState.x = startTransform.x - dy * 0.45;
          transformState.x = Math.max(-85, Math.min(85, transformState.x));
        }

        if (key === "extended" && state.extendedLiveFit) {
          fitExtendedAxesToGrid();
        } else {
          refreshSceneView(key);
        }
        updateControlLabels();
      });

      function release(event) {
        if (event.pointerId !== pointerId) {
          return;
        }

        sceneParts.rotator.classList.remove("is-dragging");
        interactionSurface.releasePointerCapture(pointerId);
        pointerId = null;
        dragMode = null;
        startTransform = null;
      }

      interactionSurface.addEventListener("pointerup", release);
      interactionSurface.addEventListener("pointercancel", release);

      interactionSurface.addEventListener("wheel", (event) => {
        if (key === "extended") {
          event.preventDefault();
          return;
        }

        event.preventDefault();
        const transformState = sceneTransforms[key];
        const zoomStep = event.deltaY > 0 ? 0.92 : 1.08;
        transformState.scale = Math.max(0.1, Math.min(4, transformState.scale * zoomStep));
        refreshSceneView(key);
      }, { passive: false });
    }

    function clampNumber(value, min, max, fallback) {
      if (!Number.isFinite(value)) {
        return fallback;
      }

      return Math.max(min, Math.min(max, value));
    }

    function getExtendedProjectedPointDefaults(cubeSize = state.cubeSize.extended) {
      const min = Math.max(1, Math.round(cubeSize / 3));
      const max = Math.max(min, Math.round(cubeSize * 2 / 3));
      return { min, max };
    }

    function syncExtendedProjectedPointDefaultsFromCubeSize(previousCubeSize, nextCubeSize) {
      const previousDefaults = getExtendedProjectedPointDefaults(previousCubeSize);
      const nextDefaults = getExtendedProjectedPointDefaults(nextCubeSize);
      const minWasDefault = state.extendedProjectedPointMin === previousDefaults.min;
      const maxWasDefault = state.extendedProjectedPointMax === previousDefaults.max;

      if (minWasDefault) {
        state.extendedProjectedPointMin = nextDefaults.min;
      }
      if (maxWasDefault) {
        state.extendedProjectedPointMax = nextDefaults.max;
      }
      if (state.extendedProjectedPointMax < state.extendedProjectedPointMin) {
        state.extendedProjectedPointMax = state.extendedProjectedPointMin;
      }
    }

    function refreshExtendedLiveFitOrRender() {
      if (state.mode === "extended" && state.extendedLiveFit && !activeTransition && !isExtendedAnimating()) {
        state.extendedFitDisplay = true;
        fitExtendedAxesToGrid();
      } else {
        renderAllScenes();
      }
    }

    function commitRotationInput(input, axis) {
      const parsed = Number(input.value);
      if (!Number.isFinite(parsed)) {
        updateControlLabels();
        return;
      }

      sceneTransforms[state.mode][axis] = parsed;
      if (state.mode === "extended" && !state.extendedLiveFit) {
        state.extendedFitDisplay = false;
      }
      if (state.mode === "extended" && state.extendedLiveFit && !activeTransition && !isExtendedAnimating()) {
        fitExtendedAxesToGrid();
      } else {
        refreshSceneView(state.mode);
      }
      updateControlLabels();
    }

    function commitExtendedAxisInput(input, key) {
      const parsed = Number(input.value);
      state.extendedAxes[key] = Math.round(clampNumber(parsed, 0, EXTENDED_AXIS_LIMIT, state.extendedAxes[key]));
      input.value = String(state.extendedAxes[key]);
      renderAllScenes();
    }

    function commitSymbolAxisInput(input, key) {
      const parsed = Number(input.value);
      state.symbolAxes[key] = Math.round(clampNumber(parsed, 0, 800, state.symbolAxes[key]));
      input.value = String(state.symbolAxes[key]);
      renderAllScenes();
    }

    function commitSymbolGapInput(input) {
      const parsed = Number(input.value);
      state.symbolGap = Math.round(clampNumber(parsed, 0, 300, state.symbolGap));
      symbolGapInput.value = String(state.symbolGap);
      symbolGapTextInput.value = String(state.symbolGap);
      renderAllScenes();
    }

    function commitSymbolOSizeInput(input) {
      const parsed = Number(input.value);
      state.symbolOSize = Math.round(clampNumber(parsed, 8, 120, state.symbolOSize));
      symbolOSizeInput.value = String(state.symbolOSize);
      symbolOSizeTextInput.value = String(state.symbolOSize);
      renderAllScenes();
    }

    function commitExtendedProjectedPointInput(input, key, min, max) {
      const parsed = Number(input.value);
      state[key] = Math.round(clampNumber(parsed, min, max, state[key]));
      if (state.extendedProjectedPointMax < state.extendedProjectedPointMin) {
        if (key === "extendedProjectedPointMin") {
          state.extendedProjectedPointMax = state.extendedProjectedPointMin;
        } else {
          state.extendedProjectedPointMin = state.extendedProjectedPointMax;
        }
      }
      extendedPointMinTextInput.value = String(state.extendedProjectedPointMin);
      extendedPointMaxTextInput.value = String(state.extendedProjectedPointMax);
      renderAllScenes();
    }

    function commitSymbolProjectedPointInput(input, key, min, max) {
      const parsed = Number(input.value);
      state[key] = Math.round(clampNumber(parsed, min, max, state[key]));
      if (state.symbolProjectedPointMax < state.symbolProjectedPointMin) {
        if (key === "symbolProjectedPointMin") {
          state.symbolProjectedPointMax = state.symbolProjectedPointMin;
        } else {
          state.symbolProjectedPointMin = state.symbolProjectedPointMax;
        }
      }
      symbolPointMinTextInput.value = String(state.symbolProjectedPointMin);
      symbolPointMaxTextInput.value = String(state.symbolProjectedPointMax);
      renderAllScenes();
    }

    function toRadians(degrees) {
      return degrees * Math.PI / 180;
    }

    function rotateVectorByTransform(vector, transformState) {
      const rx = toRadians(transformState.x);
      const ry = toRadians(transformState.y);
      const rz = toRadians(transformState.z);

      let x = vector.x;
      let y = vector.y;
      let z = vector.z;

      const cosZ = Math.cos(rz);
      const sinZ = Math.sin(rz);
      const xz = x * cosZ - y * sinZ;
      const yz = x * sinZ + y * cosZ;
      x = xz;
      y = yz;

      const cosY = Math.cos(ry);
      const sinY = Math.sin(ry);
      const xy = x * cosY + z * sinY;
      const zy = -x * sinY + z * cosY;
      x = xy;
      z = zy;

      const cosX = Math.cos(rx);
      const sinX = Math.sin(rx);
      const yx = y * cosX - z * sinX;
      const zx = y * sinX + z * cosX;
      y = yx;
      z = zx;

      return { x, y, z };
    }

    function getEndpointDirection(key) {
      const directions = {
        xNeg: { x: -1, y: 0, z: 0 },
        xPos: { x: 1, y: 0, z: 0 },
        yNeg: { x: 0, y: -1, z: 0 },
        yPos: { x: 0, y: 1, z: 0 },
        zNeg: { x: 0, y: 0, z: -1 },
        zPos: { x: 0, y: 0, z: 1 }
      };

      return directions[key];
    }

    function projectScenePoint(point, transformState, mode) {
      const rotated = rotateVectorByTransform(point, transformState);
      const perspectiveDistance = getPerspectiveDistanceValue(mode);
      const perspectiveScale = perspectiveDistance == null
        ? 1
        : perspectiveDistance / Math.max(24, perspectiveDistance - rotated.z);
      const scale = transformState.scale || 1;

      return {
        x: state.frame.width / 2 + transformState.panX + rotated.x * perspectiveScale * scale,
        y: state.frame.height / 2 + transformState.panY + rotated.y * perspectiveScale * scale
      };
    }

    function getPerspectiveDistanceValue(mode) {
      const distortion = state.perspectiveDistortion[mode];
      if (distortion === 0) {
        return null;
      }

      return Math.max(180, 2800 - distortion * 12);
    }

    function roundSvg(value, digits = 2) {
      return Number(value.toFixed(digits));
    }

    function escapeXml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("\"", "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function getTemplateData(templateId) {
      if (templateDataCache.has(templateId)) {
        return templateDataCache.get(templateId);
      }

      const template = document.getElementById(templateId);
      const svg = template.content.firstElementChild.cloneNode(true);
      const [minX, minY, width, height] = (svg.getAttribute("viewBox") || "0 0 1 1")
        .trim()
        .split(/\s+/)
        .map(Number);
      const samplePoints = [];

      svg.querySelectorAll("path, polygon, polyline, rect, circle, ellipse, line").forEach((shape) => {
        if (typeof shape.getTotalLength === "function" && typeof shape.getPointAtLength === "function") {
          try {
            const totalLength = shape.getTotalLength();
            if (Number.isFinite(totalLength) && totalLength > 0.01) {
              const steps = Math.max(12, Math.min(180, Math.ceil(totalLength / 8)));
              for (let i = 0; i <= steps; i += 1) {
                const point = shape.getPointAtLength(totalLength * i / steps);
                samplePoints.push({ x: point.x, y: point.y });
              }
              return;
            }
          } catch (error) {
          }
        }

        if (typeof shape.getBBox === "function") {
          try {
            const bbox = shape.getBBox();
            samplePoints.push(
              { x: bbox.x, y: bbox.y },
              { x: bbox.x + bbox.width, y: bbox.y },
              { x: bbox.x + bbox.width, y: bbox.y + bbox.height },
              { x: bbox.x, y: bbox.y + bbox.height }
            );
          } catch (error) {
          }
        }
      });

      if (!samplePoints.length) {
        samplePoints.push(
          { x: minX, y: minY },
          { x: minX + width, y: minY },
          { x: minX + width, y: minY + height },
          { x: minX, y: minY + height }
        );
      }

      const data = {
        minX,
        minY,
        width,
        height,
        markup: svg.innerHTML.trim(),
        samplePoints
      };
      templateDataCache.set(templateId, data);
      return data;
    }

    function getGlyphLayerOffsets(depth) {
      const layers = depth <= 0 ? 1 : Math.max(2, Math.min(18, Math.round(depth / 2)));
      const step = layers > 1 ? depth / (layers - 1) : 0;
      const start = -depth / 2;
      const offsets = [];

      for (let i = 0; i < layers; i += 1) {
        offsets.push(layers === 1 ? 0 : start + step * i);
      }

      return offsets;
    }

    function getProjectedGlyphBasis(center, transformState, mode) {
      const centerProjected = projectScenePoint(center, transformState, mode);
      const xBasisProjected = projectScenePoint({ x: center.x + 1, y: center.y, z: center.z }, transformState, mode);
      const yBasisProjected = projectScenePoint({ x: center.x, y: center.y + 1, z: center.z }, transformState, mode);
      return {
        centerProjected,
        basisX: {
          x: xBasisProjected.x - centerProjected.x,
          y: xBasisProjected.y - centerProjected.y
        },
        basisY: {
          x: yBasisProjected.x - centerProjected.x,
          y: yBasisProjected.y - centerProjected.y
        }
      };
    }

    function buildGlyphMarkupWithProjectedBasis(templateId, width, height, centerProjected, basisX, basisY, options = {}) {
      const data = getTemplateData(templateId);
      const scaleX = width / data.width;
      const scaleY = height / data.height;
      const centerX = data.minX + data.width / 2;
      const centerY = data.minY + data.height / 2;
      const a = basisX.x * scaleX;
      const b = basisX.y * scaleX;
      const c = basisY.x * scaleY;
      const d = basisY.y * scaleY;
      const e = centerProjected.x - centerX * a - centerY * c;
      const f = centerProjected.y - centerX * b - centerY * d;
      const opacity = options.opacity == null ? "" : " opacity=\"" + roundSvg(options.opacity, 3) + "\"";
      return "<g" + opacity + " style=\"color:#000000\" transform=\"matrix(" +
        roundSvg(a, 5) + " " + roundSvg(b, 5) + " " +
        roundSvg(c, 5) + " " + roundSvg(d, 5) + " " +
        roundSvg(e, 4) + " " + roundSvg(f, 4) + ")\">" +
        data.markup +
        "</g>";
    }

    function buildExportGlyph(templateId, width, height, center, transformState, mode, options = {}) {
      const basis = getProjectedGlyphBasis(center, transformState, mode);
      return buildGlyphMarkupWithProjectedBasis(
        templateId,
        width,
        height,
        basis.centerProjected,
        basis.basisX,
        basis.basisY,
        options
      );
    }

    function getBoxFaceDefinitions(width, height, depth, x, y, z) {
      const hw = width / 2;
      const hh = height / 2;
      const hd = depth / 2;
